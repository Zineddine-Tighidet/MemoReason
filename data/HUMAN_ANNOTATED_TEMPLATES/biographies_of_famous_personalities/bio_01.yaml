  original_document: 'Christine Madeleine Odette Lagarde is a French politician and lawyer who has been the president of the
    European Central Bank since 2019. She previously served as the 11th Managing Director of the International Monetary Fund
    (IMF) from 2011 to 2019. Lagarde had also served in the Government of France, most prominently as Minister of the Economy,
    Finance and Industry from 2007 until 2011. She is the first woman to hold each of those posts.


    Born and raised in Paris, Lagarde graduated from law school at Paris Nanterre University and obtained a Master''s degree
    from Sciences Po Aix. After being admitted to the Paris Bar, she joined the international law firm Baker & McKenzie as
    an associate in 1981, specializing in labour and anti-trust, as well as mergers and acquisitions. Rising through the ranks,
    she was a member of the executive committee of the firm from 1995 until 1999, before being elevated to its Chair between
    1999 and 2004; she was the first woman in both positions. She held the top post until she decided to go into public service.


    Lagarde returned to France when appointed Minister of Foreign Trade from 2005 to 2007, then briefly served as Minister
    of Agriculture and Fisheries from May to June 2007, and finally, as Minister of Finance from 2007 to 2011, making her
    the first woman to hold the finance portfolio of any Group of Eight economy. During her tenure, Lagarde oversaw the government
    response to the 2008 financial crisis, for which the Financial Times ranked her the best finance minister in the Eurozone.


    On 5 July 2011, she was elected to replace Dominique Strauss-Kahn as managing director of the IMF for a five-year term.
    Her appointment was the 11th consecutive appointment of a European to head the IMF. She was selected by consensus for
    a second five-year term, starting 5 July 2016, being the only candidate nominated for the post. In December 2016, a French
    court convicted her of negligence relating to her role in the Bernard Tapie arbitration, but did not impose a penalty.
    Lagarde resigned from the IMF following her nomination as president of the ECB.


    In 2019, 2020, 2022, 2023, 2024, and 2025, Forbes ranked her number two on its World''s 100 Most Powerful Women list.'
