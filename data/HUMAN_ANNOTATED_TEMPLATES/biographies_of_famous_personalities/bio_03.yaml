  wikipedia_title: Franklin D. Roosevelt
  wikipedia_url: https://en.wikipedia.org/wiki/Franklin_D._Roosevelt
  original_document: 'Franklin Delano Roosevelt (January 30, 1882 – April 12, 1945), also known as FDR, was the 32nd president
    of the United States, serving from 1933 until his death in 1945. He is the longest-serving U.S. president and the only
    one to have served more than two terms. His first two terms were centered on combating the Great Depression, while his
    third and fourth focused on U.S. involvement in World War II. A member of the Democratic Party, Roosevelt served in the
    New York State Senate from 1911 to 1913 and as the 44th governor of New York from 1929 to 1932.


    Born into the prominent Delano and Roosevelt families in Hyde Park, New York, Roosevelt graduated from Harvard University.
    He was elected to the New York State Senate in 1910, before becoming the assistant secretary of the Navy under President
    Woodrow Wilson from 1913 to 1920. Roosevelt was the running mate of James M. Cox on the Democratic ticket in the 1920
    presidential election, which Cox lost to Republican nominee Warren G. Harding. In 1921, an illness permanently paralyzed
    his legs. However, partly through the encouragement of his wife Eleanor, he returned to public office upon being elected
    governor of New York in 1928. As governor, he promoted programs to combat the Great Depression.


    Roosevelt defeated President Herbert Hoover in a landslide victory in the 1932 presidential election. During his first
    100 days as president, Roosevelt spearheaded unprecedented federal legislation, initiated the program to implement the
    New Deal, build the New Deal coalition, and realign American politics into the Fifth Party System. He created programs
    to provide relief to the unemployed and farmers while seeking economic recovery with the National Recovery Administration
    and other programs. He also instituted major regulatory reforms related to finance, communications, and labor, and presided
    over the end of Prohibition. He was reelected in 1936, in one of the largest landslide victories in American history.
    Roosevelt was unable to expand the Supreme Court in 1937, the same year the conservative coalition was formed to block
    the implementation of further New Deal programs and reforms. Major surviving programs and legislation implemented under
    Roosevelt include the Securities and Exchange Commission, the National Labor Relations Act, the Federal Deposit Insurance
    Corporation, and Social Security. In 1940, he was reelected, as there were not presidential term limits until 1951.


    Following the Japanese attack on Pearl Harbor on December 7, 1941, Roosevelt obtained a declaration of war on Japan, and
    subsequently on Japan''s Axis partners, Nazi Germany and Fascist Italy. He worked closely with other national leaders
    in leading the Allies against the Axis powers. Roosevelt supervised the mobilization of the American economy to support
    the war effort and implemented a Europe first strategy. He also initiated the development of the first atomic bomb and
    worked with the other Allied leaders to lay the groundwork for the United Nations. Roosevelt won reelection in 1944, but
    died in 1945. Since then, some of his actions have been criticized, such as his ordering of the internment of Japanese
    Americans. Nonetheless, historical rankings consistently place him among the three greatest American presidents.'
