  wikipedia_url: https://en.wikipedia.org/wiki/Angela_Merkel
  original_document: 'Angela Dorothea Merkel (née Kasner; born 17 July 1954) is a German retired politician who served as
    Chancellor of Germany from 2005 to 2021. She is the only woman to have held the office and the only from former East Germany.
    She was Leader of the Opposition from 2002 to 2005 and Leader of the Christian Democratic Union (CDU) from 2000 to 2018.


    Merkel was born in Hamburg in West Germany. Her family moved to East Germany when she was an infant. A member of the communist
    East German Free German Youth (FDJ), Merkel obtained a doctorate in quantum chemistry in 1986 and worked as a research
    scientist until 1989. She then entered politics in the wake of the Revolutions of 1989, briefly serving as deputy spokeswoman
    for the first democratically elected government of East Germany, led by Lothar de Maizière. Following German reunification
    in 1990, Merkel was elected to the Bundestag for the state of Mecklenburg-Vorpommern. As the protégée of Chancellor Helmut
    Kohl, Merkel was appointed as Minister for Women and Youth in 1991, later becoming Minister for the Environment, Nature
    Conservation and Nuclear Safety in 1994. After the CDU lost the 1998 federal election, Merkel was elected general secretary
    of the party. She then became the party''s first female leader, and the first female leader of the Opposition, two years
    later.


    Following the 2005 federal election, Merkel was elected chancellor, leading a grand coalition consisting of the CDU, the
    Christian Social Union (CSU), and the Social Democratic Party of Germany (SPD). She was the first woman to be elected
    chancellor, and the first chancellor of reunified Germany to have been raised in the former East Germany. In the 2009
    federal election, the CDU obtained the largest share of the vote, and Merkel subsequently formed a coalition government
    with the Free Democratic Party (FDP), an alliance more favourable to the CDU than the grand coalition. In the 2013 federal
    election, the CDU won a landslide victory and formed a second grand coalition with the SPD, after the FDP lost all of
    its representation in the Bundestag. In the 2017 federal election, Merkel led the CDU to become the largest party for
    the fourth time, resulting in the formation of a third grand coalition with the SPD.


    In foreign policy, Merkel emphasised international cooperation, both in the context of the EU and NATO, and initiating
    the Russian reset and strengthening of Eurasian and transatlantic economic relations. In the first half of 2007, Merkel
    served as president of the European Council and played a central role in the negotiation of the Treaty of Lisbon and the
    Berlin Declaration. Merkel''s governments managed the 2008 financial crisis and the Euro area crisis. She negotiated the
    2008 European Union stimulus plan, which focused on infrastructure spending and public investment to counteract the Great
    Recession. Also in 2008, she actively blocked the access of Ukraine and Georgia in the enlargement of NATO during the
    2008 Bucharest summit.


    In domestic policy, Merkel''s Energiewende programme supported the development of renewable energy sources and eventually
    phased out the use of nuclear power in Germany. Despite the 2014 Russian annexation of Crimea, which prompted sanctions
    around the world, she initiated the construction of the controversial Nord Stream 2 pipelines to Russia and protected
    their construction from United States sanctions imposed in 2019. Reforms to the Bundeswehr, health care reform, the 2010s
    European migrant crisis, and the COVID-19 pandemic were major issues during her chancellorship. Merkel stepped down as
    leader of the CDU in 2018 and did not seek a fifth term as chancellor in the 2021 federal election. Following the 2022
    Russian invasion of Ukraine, her legacy came under increased scrutiny both in Germany and abroad for her relatively good
    relations with Russia and increasing the German economy''s dependence on Russia, as well as the downsizing of the Bundeswehr
    that occurred during her tenure.'
