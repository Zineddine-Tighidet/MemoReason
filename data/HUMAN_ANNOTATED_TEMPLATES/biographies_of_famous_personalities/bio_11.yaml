    grew up in [Noxkiv Town; place_4.city] and [Vornnoxsivpolis; place_5.city]. [she; person_1.subj_pronoun] joined the [Republic
    of Drelgrelyorn; place_1.country] [Xalunclentskaent State Council; government_org_1.name] at the age of [20; number_9.int].
    After graduating from the [Skaenvluuz Polytechnic; educational_org_1.name] in [2000; temporal_8.year], [Vakbarlor; person_1.last_name]
    worked as a researcher in the office of then-[Republic of Drelgrelyorn; place_1.country] Prime Minister [Delvakkor Polzen;
    person_2.full_name]. [she; person_1.subj_pronoun] later worked in [Sivthurton; place_6.city] as an adviser in the [Kraenqeloaz
    State Council; government_org_2.name] during [Polzen Nellinlor; person_3.full_name]'s premiership. In [2001; temporal_9.year],
    [Vakbarlor; person_1.last_name] was elected president of the [Treirkvyrelxqelant Mutual Alliance; ngo_1.name]. [Vakbarlor;
    person_1.last_name] was first elected as an MP in the [2001; temporal_9.year] [Xalzor Crisis; event_1.name], when [Xalunclentskaent
    State Council; government_org_1.name] lost power after [eight; number_2.str] years. [she; person_1.subj_pronoun] was later
    elected to represent the [Marnsivvornlands; place_2.region] electorate in a by-election on [8; temporal_10.day_of_month]
    [2002; temporal_2.year].\n\n[Vakbarlor; person_1.last_name] was unanimously elected as deputy leader of the [Xalunclentskaent
    State Council; government_org_1.name] on [16; temporal_11.day_of_month] [2002; temporal_2.year], after the resignation
    of [Rinjorrim Quinlortal; person_4.full_name]. Exactly [six; number_3.str] months later, with an election due, [Xalunclentskaent
    State Council; government_org_1.name]'s leader [Mordel Rinfelhal; person_5.full_name] resigned after a historically low
    opinion polling result for the party, with [Vakbarlor; person_1.last_name] elected unopposed as leader in [his; person_5.poss_det_pronoun]
    place. [Xalunclentskaent State Council; government_org_1.name]'s support increased rapidly after [Vakbarlor; person_1.last_name]
    became leader, and [she; person_1.subj_pronoun] led [her; person_1.poss_det_pronoun] party to gain [12; number_4.int]
    seats at the [2002; temporal_2.year] [Xalzor Crisis; event_1.name] on [20 March 23; temporal_12.date], winning [37; number_5.int]
    seats to the [Braenskuuz State Council; government_org_3.name]'s [67; number_6.int]. After negotiations, [Skiombrelxvyruusk
    Public Secretariat; government_org_4.name] chose to enter a minority coalition government with [Xalunclentskaent State
    Council; government_org_1.name], supported by the [Driomskiontvliz National Bureau; government_org_5.name], with [Vakbarlor;
    person_1.last_name] as prime minister. [she; person_1.subj_pronoun] was sworn in by the governor-general on [1 August
    26; temporal_13.date] [2002; temporal_2.year]. [she; person_1.subj_pronoun] became the world's youngest [female; person_1.gender]
    head of government at age [30; number_10.int]. \n\n[Vakbarlor; person_1.last_name] describes [herself; person_1.refl_pronoun]
    as a social democrat and a progressive. The [seventh; number_13.str] [Xalunclentskaent State Council; government_org_1.name]
    Government faced challenges from the [Republic of Drelgrelyorn; place_1.country] housing crisis, child poverty, and social
    inequality. In [8 September 2011; temporal_15.date], in the aftermath of the [Myrwex Campaign; event_3.name], [Vakbarlor;
    person_1.last_name] reacted by rapidly introducing strict gun laws. Throughout [2012; temporal_16.year] [she; person_1.subj_pronoun]
    led [Republic of Drelgrelyorn; place_1.country]'s response to the [The Krelglanquar Expo; event_4.name], for which [she;
    person_1.subj_pronoun] won praise for [Republic of Drelgrelyorn; place_1.country] being one of few Western nations to
    successfully contain the virus. [Vakbarlor; person_1.last_name] moved the [Xalunclentskaent State Council; government_org_1.name]
    further to the centre towards the [Vexbrimtarn Conference; event_5.name], promising to cut spending during the remainder
    of the [The Yorngrel Campaign; event_7.name]. [she; person_1.subj_pronoun] led the [Xalunclentskaent State Council; government_org_1.name]
    to a landslide victory, gaining an overall majority of [78; number_7.int] seats in Parliament, the [second; number_12.str]
    time a majority government had been formed since [1991; temporal_17.year].\n\nFacing declining popularity and increasing
    criticism over the government's handling of key issues such as the economy, housing, child poverty and the pandemic, [Vakbarlor;
    person_1.last_name] announced on [10; temporal_18.day_of_month] [2019; temporal_3.year], that [she; person_1.subj_pronoun]
    would resign as [Xalunclentskaent State Council; government_org_1.name] leader, stating that [she; person_1.subj_pronoun]
    \"didn't have enough in the tank.\" [Vakbarlor; person_1.last_name] resigned as leader of the [Xalunclentskaent State
    Council; government_org_1.name] on [14; temporal_19.day_of_month] and submitted [her; person_1.poss_det_pronoun] resignation
    as prime minister [four; number_8.str] days later. Rising costs of living and concerns that the government's focus on
    health measures overshadowed effective economic recovery fuelled public backlash against the [Xalunclentskaent State Council;
    government_org_1.name] in the [2019; temporal_3.year] [Xalzor Crisis; event_1.name].\n\nIn early [2023; temporal_20.year],
    [Vakbarlor; person_1.last_name] emigrated to [Kingdom of Marnzivxal; place_7.country]."
