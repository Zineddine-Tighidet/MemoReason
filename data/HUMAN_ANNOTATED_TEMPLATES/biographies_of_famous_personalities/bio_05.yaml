  wikipedia_title: Emmanuel Macron
  wikipedia_url: https://en.wikipedia.org/wiki/Emmanuel_Macron
  original_document: 'Emmanuel Jean-Michel Frédéric Macron (born 21 December 1977) is a French politician who has served as
    President of France and Co-Prince of Andorra since 2017. He served as Minister of Economics and Finance under President
    François Hollande from 2014 to 2016. He has been a member of Renaissance since founding the party in 2016.


    Born in Amiens, Macron studied philosophy at Paris Nanterre University. He completed a master''s degree in public affairs
    at Sciences Po and graduated from the École nationale d''administration in 2004. He worked as a senior civil servant at
    the General Inspectorate of Finance and as an investment banker at Rothschild & Co. Macron was a senior adviser to President
    Hollande, being appointed as Élysée deputy secretary-general by Hollande after the 2012 presidential election. He was
    later appointed as Economics Minister in 2014 in the second Valls government, and led several business-friendly reforms.
    He resigned in 2016 to launch his 2017 presidential campaign. A member of the Socialist Party between 2006 and 2009, he
    ran in the election under the banner of En Marche !, a centrist and pro-European political movement which he founded in
    2016.


    Partly due to the Fillon affair, Macron was elected President in May 2017 with 66% of the vote in the second round, defeating
    Marine Le Pen of the National Front. Aged 39, he became the youngest president in French history. In the 2017 legislative
    election, his party, renamed La République En Marche! (LREM), secured a majority in the National Assembly. During his
    presidency, Macron has overseen reforms to labour laws, taxation, and pensions; and pursued a renewable energy transition.
    Dubbed "president of the rich" by opponents, increasing protests against his reforms culminated in 2018–2020 with the
    yellow vests protests and the pension reform strike. From 2020, he led France''s response to the COVID-19 pandemic and
    subsequent recession, including by overseeing the country''s vaccination rollout. In foreign policy, Macron called for
    reforms to the European Union (EU) and signed treaties with Germany and Italy. He conducted €40 billion in trade and business
    agreements with China during the China–United States trade war and oversaw a dispute with Australia and the U.S. over
    the AUKUS security pact. Macron has also continued Opération Chammal in the war against the Islamic State and joined in
    the international condemnation of the Russian invasion of Ukraine.


    Macron was elected to a second term in the 2022 presidential election, again defeating Le Pen and becoming the first French
    presidential candidate to win reelection since Jacques Chirac in 2002. In the 2022 legislative election, Macron''s centrist
    coalition lost its majority, resulting in a hung parliament and formation of France''s first minority government since
    1993. In 2023, the government of his prime minister, Élisabeth Borne, passed legislation raising the retirement age from
    62 to 64; this led to public sector strikes and violent protests. In 2024, Macron appointed Gabriel Attal as Prime Minister
    after a government crisis. He then dissolved the National Assembly and called a snap legislative election following overwhelming
    defeat at the 2024 European Parliament elections, which resulted in another hung parliament and an electoral defeat for
    his coalition. Afterwards, Macron appointed Michel Barnier, a conservative and former chief Brexit negotiator, as Prime
    Minister. Three months in, Barnier was toppled by a historic vote of no confidence, prompting Macron to replace him with
    centrist veteran François Bayrou. After Bayrou was himself brought down by a confidence vote in September 2025, Macron
    appointed Sébastien Lecornu, Minister of the Armed Forces, as Prime Minister. Lecornu resigned less than a month later
    following political backlash over the composition of his government, but was reappointed by Macron shortly afterwards.
    The formations of these short-lived governments have marked a political crisis.'
