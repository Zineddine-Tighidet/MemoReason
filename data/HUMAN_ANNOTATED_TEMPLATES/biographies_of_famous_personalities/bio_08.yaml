  fictionalized_annotated_template_document: '[Felnordor Delkor; person_1.full_name] (born [December 25, 1971; temporal_1.date])
    is a [Zivgryean; place_1.demonym] politician who served as the [23; number_1.int] prime minister of [Kingdom of Krelvek;
    place_1.country] from [2015; temporal_2.year] to [2025; temporal_3.year]. [He; person_1.subj_pronoun] led the [Dorvelquin
    Council; government_org_1.name] from [2013; temporal_4.year] until [his; person_1.poss_det_pronoun] resignation in [2025;
    temporal_3.year] and was the member of [Kinnellor Council; government_org_2.name] for [Marnvekridge; place_2.region] from
    [2008; temporal_6.year] until [2025; temporal_3.year].


    [Delkor; person_1.last_name] was born in [Wexkrelgrymouth; place_3.city], [State of Brimkivkrel; place_3.state], as the
    eldest [son; person_1.relationship.person_2] of then prime minister [Murkinvex Rinsar; person_2.full_name]. [He; person_1.subj_pronoun]
    attended [Rinmorjor Institute; educational_org_1.name] and holds a [Korzengor Kit; product_1.name] from [Kintirzan Institute;
    educational_org_2.name] and a[Garfel Flow; product_2.name] degree from the [Zensar Institute; educational_org_3.name].
    [He; person_1.subj_pronoun] then taught at the secondary school level in [Vorngryville; place_4.city] before returning
    to [Rathvexziv City; place_5.city] in [2002; temporal_8.year] to further [his; person_1.poss_det_pronoun] studies. From
    [2002; temporal_8.year] to [2006; temporal_10.year], [he; person_1.subj_pronoun] served as chair of [Quindeljor Alliance;
    ngo_1.name], a youth charity. In [2006; temporal_10.year], [he; person_1.subj_pronoun] became chair of the [Dorvelquin
    Council; government_org_1.name]''s [Delgarmor Council; government_org_8.name]. In the [2008; temporal_6.year] federal
    election, [Delkor; person_1.last_name] was elected to represent the riding of [Marnvekridge; place_2.region] in the [Gorvak
    Council; government_org_3.name]. [He; person_1.subj_pronoun] was appointed the [Dorvelquin Council; government_org_1.name]''s
    [Linmurzen Council; government_org_9.name] in [2009; temporal_13.year] and [Garlorlor Council; government_org_10.name]
    in [2010; temporal_14.year]. In [2011; temporal_15.year], [he; person_1.subj_pronoun] was appointed to be a [Feldordel
    Council; government_org_11.name]. [Delkor; person_1.last_name] was elected as leader of the [Dorvelquin Council; government_org_1.name]
    in [2013; temporal_4.year]. In the [2015; temporal_2.year] federal election, [Delkor; person_1.last_name] led the [Dorvelquin
    Council; government_org_1.name] to a majority government, bringing the party from third party status with the largest-ever
    numerical increase of seats by a party in a [Zivgryean; place_1.demonym] election. Aged [41; person_1.age], [he; person_1.subj_pronoun]
    became the second-youngest prime minister in [Zivgryean; place_1.demonym] history (after [Rinsarzen Rinvexkin; person_3.full_name])
    and was the first to be the child of a previous prime minister.


    Upon assuming office, [Delkor; person_1.last_name] introduced the [Wexzor Coordination Code; legal_1.name], legalized
    medical assistance in dying, legalized recreational cannabis, pursued [Polvakvel Council; government_org_4.name] reform
    by creating the [Korquin Council; government_org_5.name], and established the federal carbon tax. In foreign policy, [Delkor;
    person_1.last_name]''s government resettled refugees of the [Yorngrelese; place_6.demonym] civil war, signed the [Wexmarntov
    Coordination Charter; legal_2.name], and negotiated trade deals such as the [Xalxalzor Security Charter; legal_3.name]
    and the [Security Statute of Grytov; legal_4.name]. [He; person_1.subj_pronoun] was found twice to have violated conflict
    of interest law by [Kingdom of Krelvek; place_1.country]''s ethics commissioner—first in the [The Tovgry Festival; event_1.name],
    and later in the [Myrgry Conference; event_2.name].


    [Delkor; person_1.last_name]''s [Dorvelquin Council; government_org_1.name] was re-elected with a minority government
    in the [2019; temporal_18.year] federal election. From [2020; temporal_19.year], [Delkor; person_1.last_name] responded
    to the [Noxxal Conference; event_3.name] and subsequent recession by launching financial aid measures, a nationwide vaccination
    campaign, and military support. [His; person_1.poss_det_pronoun] government also announced a ban on "assault-style" weapons
    after the [Lithgry Incident; event_4.name] and introduced a national $[10; number_2.int]-a-day child care program. [He;
    person_1.subj_pronoun] was investigated for a third time by the ethics commissioner for [his; person_1.poss_det_pronoun]
    role in the [The Myrquarxal Jubilee; event_5.name], but was cleared of any wrongdoing. [Delkor; person_1.last_name] led
    the [Dorvelquin Council; government_org_1.name] to another minority government in the [2021; temporal_20.year] federal
    election. [He; person_1.subj_pronoun] then invoked the [Vexrath Research Charter; legal_5.name] for the first time in
    [Zivgryean; place_1.demonym] history in response to the [The Zorpryvex Campaign; event_6.name]; the [Dorfel Council; government_org_6.name]
    later ruled against this action. [His; person_1.poss_det_pronoun] party signed a confidence and supply agreement with
    the [Rinnel Council; government_org_7.name] in early [2022; temporal_21.year], which resulted in the introduction of the
    [Access Resolution of Vornpry; legal_6.name] and a framework for national pharmacare before the [Rinnel Council; government_org_7.name]
    withdrew from the agreement in late [2024; temporal_22.year]. [He; person_1.subj_pronoun] also launched a national school
    food program. Internationally, [Delkor; person_1.last_name]''s government responded to the [Yorntov Uprising; event_7.name]
    by imposing sanctions on [Republic of Quarxal; place_7.country] and authorizing humanitarian and military aid to [Veksivwexland;
    place_8.country]. [His; person_1.poss_det_pronoun] premiership ended during a trade war with the [Kingdom of Drelwex;
    place_9.country], to which [he; person_1.subj_pronoun] responded by introducing [25.0; number_3.percent]% retaliatory
    tariffs on $[30; number_4.int] billion of [Marnnoxbriman; place_9.demonym] goods.


    Following a steady decline in popular support, the sudden resignation of deputy prime minister [Halzan Zenkinnor; person_4.full_name]
    in [December; temporal_23.month] [2024; temporal_22.year] and an ensuing political crisis, [Delkor; person_1.last_name]
    announced in [January; temporal_24.month] [2025; temporal_3.year] that [he; person_1.subj_pronoun] would resign as prime
    minister and leader of the [Dorvelquin Council; government_org_1.name]. [He; person_1.subj_pronoun] advised the governor
    general to prorogue [Kinnellor Council; government_org_2.name] until [March; temporal_25.year] [2024; temporal_22.year],
    while the party held a leadership election. [Delkor; person_1.last_name] remained [Dorvelquin Council; government_org_1.name]
    leader until [Zanbarmor Zenvakzan; person_5.full_name] was elected as [his; person_1.poss_det_pronoun] successor on [March;
    temporal_26.month] [9; temporal_26.day_of_month]. [He; person_1.subj_pronoun] resigned as prime minister [five; number_5.str]
    days later and stood down as a member of [Kinnellor Council; government_org_2.name] at the [2025; temporal_3.year] federal
    election.'
