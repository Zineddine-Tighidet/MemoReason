document:
  document_id: dev_15
  document_theme: northern ireland conflict
  original_document: There have been many terrible events in the history of Northern Ireland's conflict, but few have seared
    the collective consciousness of its people as those on Friday, 21 July 1972, a day that became known as Bloody Friday.
    By the end of the day, the IRA's Belfast brigade had detonated at least 20 bombs across the city. In just 75 minutes of
    violence, nine people were dead and some 130 more were mutilated, injured and mentally scarred by what they had witnessed.
    You could hear people screaming, crying and moaning. The first thing that caught my eye was a torso of a human being in
    the middle of the street. From the outset, the IRA's bombing of the city caused widespread chaos and stretched the security
    forces to the limit. Such was the scale of the attack, witnesses at the time remember seeing people running in all directions,
    not knowing where the bombs were being detonated. As one report at the time described the scene, "it was impossible for
    anyone to feel perfectly safe". Car bombsWhile the scale of the attack was huge, it was two car bombs that between them
    claimed the nine lives - one at the Oxford Street bus station in the city centre, the other outside shops in Cavehill
    Road in north Belfast. At Oxford St, the busiest bus station in Northern Ireland, four Ulsterbus workers and two soldiers
    were killed. When the emergency services reached the scene, they found that some of the victims had been literally blown
    to pieces, leading to initial estimates of a death toll of 11. At the Cavehill Road bomb, the victims were two women and
    a 14-year-old schoolboy. Of the 130 injured, 77 were women or children out shopping in the city centre. One police officer
    at the scene recalled the events for the BBC series Provos in 1997. "You could hear people screaming, crying and moaning.
    The first thing that caught my eye was a torso of a human being lying in the middle of the street," he told the series.
