  document_theme: columbia bombing
  original_document: 'Blast also injured more than 50 people, but authorities have yet to suggest who was behind the attack.
    Twenty-one people have been killed and dozens more injured in a car bombing at a Colombian police academy in Bogotá, recalling
    the high-profile attacks associated with the bloodiest chapters of the country’s guerrilla and drug conflicts.The scene
    outside the General Santander police academy was chaotic after the mid-morning explosion on Thursday, with ambulances
    and helicopters rushing to the normally tightly controlled facility.Witnesses said they heard a loud explosion that destroyed
    windows in adjacent buildings. Pictures on social media showed a charred vehicle surrounded by debris on the academy’s
    campus.Among the dead were a Panamanian and an Ecuadorian national.Alcaldía de Bogotá (@Bogota) #Atención El alcalde @EnriquePenalosa
    se encuentra en la Escuela General Santander acompañando a la @PoliciaColombia.En breve entregaremos más información.#BogotáCondenaElTerrorismo
    pic.twitter.com/HBekT48yYiRafael Trujillo said he was delivering a care package to his son Gerson, who entered the school
    two days ago, when he was stopped in his tracks by the blast a block away from the school’s heavily fortified entrance.“I’m
    sad and very worried because I don’t have any information about my son,” said Trujillo, standing outside the facility,
    where police officers had set up a taped perimeter. “This reminds me of some very sad days in the past.”President Iván
    Duque, who was visiting a western state, was rushing back to the capital to oversee the police investigation into what
    he called a “miserable” attack.“All of us Colombians reject terrorism and are united in confronting it,” Duque said in
    a tweet. “We won’t bend in the face of violence.”Investigators had identified the car’s driver as José Aldemar Rojas Rodríguez,
    who was among the dead, said the Colombian attorney general, Néstor Humberto Martínez.'
