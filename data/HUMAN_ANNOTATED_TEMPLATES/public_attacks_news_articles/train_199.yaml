  document_theme: birmingham pub bombings
  original_document: 'Birmingham pub bombings: Lawyer renews call for inquests. The two bombs went off 10 minutes apart in
    pubs a few yards from each other.A lawyer for the family of one of the 21 people killed in the Birmingham pub bombings
    is calling for inquests to be held for the victims.There have been no inquests since two bombs exploded at the Mulberry
    Bush and the Tavern in the Town in November 1974, which also injured 182 people.Human rights lawyer Kevin Winters said
    he will be writing to West Midlands Police and the relevant coroner.Inquests would allow access to certain material never
    before disclosed.Six men, later dubbed the Birmingham Six, were jailed in 1975 but their convictions were quashed in 1991.Families
    of the victims have criticised police, accusing them of withholding information over the years and say 40 years on from
    the bombings they still do not have the answers they need.Calls for a fresh investigation into what happened were denied
    by West Midlands Police in April.Speaking exclusively to BBC Radio WM ahead of the 40th anniversary next week , Mr Winters,
    who has represented families of victims of the Troubles in Northern Ireland, said inquests would have been put off because
    of legal proceedings against the Six but "uniquely we now know the wrong people were put behind bars."image caption Twenty-one
    people were killed when bombs exploded at the Mulberry Bush and Tavern in the Town on 21 November 1974Brother and sister
    Julie and Brian Hambleton, who lost their sister Maxine in the bombings, have been leading a campaign to try to find out
    more about what happened.Ms Hambleton, who met Mr Winters this week to ask him to represent them, said she does not understand
    why inquests have never been held, even after 1991."Why hasn''t anyone stepped up before now and said anything?", Ms Hambleton
    said.image copyright (C) British Broadcasting Corporation image caption Julie Hambleton said she feels she has not been
    given the answers she needs about her sister''s death.'
