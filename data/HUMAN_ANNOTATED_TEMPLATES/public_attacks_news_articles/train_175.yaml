  document_theme: iraq
  original_document: The fight against the Islamic State group in Iraq and SyriaMembers of 5th Special Forces Group (A) conducting
    50. Cal Weapons training during counter ISIS operations at Al Tanf Garrison in southern Syria. US Marine CorpsThe US military
    also continues to be active in Iraq and Syria in the ongoing fight against the Islamic State group, conducting airstrikes
    and advising local forces on the ground.At least 10 US service members were killed in Iraq in 2018, though none of the
    deaths were a direct result of enemy action.Master Sgt. Jonathan J. Dunbar was killed by a roadside bomb in Syria in late
    March.Human rights groups have accused the US-led coalition of reckless behavior and "potential war crimes" in the fight
    against the Islamic State group in Iraq and Syria.While civilian casualties are still being assessed for 2018, a report
    from the monitoring group Airwars said the US and its allies may have killed up to 6000 civilians via strikes in Iraq
    and Syria in 2017 alone.The US has been waging a campaign against the Islamic State group since August 2014.In April,
    President Donald Trump also authorized missile strikes against Syrian President Bashar al-Assad, targeting chemical weapons
    facilities in concert with the French and British.
  document_to_annotate: The fight against the [Islamic State group; military_org_1.name] in [Iraq; place_1.country] and [Syria;
    place_2.country] -- Members of [5th Special Forces Group (A); military_org_2.name] conducting .[50; number_2.int] Cal
    Weapons training during counter [ISIS; military_org_1.name] operations at [Al Tanf Garrison; place_3.street] in southern
    [Syria; place_2.country]. The [US; place_5.country] military also continues to be active in [Iraq; place_1.country] and
    [Syria; place_2.country] in the ongoing fight against the [Islamic State group; military_org_1.name], conducting airstrikes
    and advising local forces on the ground.At least [10; number_3.int] [US; place_5.country] service members were killed
    in [Iraq; place_1.country] in [2018; temporal_1.year], though none of the deaths were a direct result of enemy action.
    Master Sgt. [Jonathan J. Dunbar; person_1.full_name] was killed by a roadside bomb in [Syria; place_2.country] in late
    [March; temporal_2.month]. Human rights groups have accused the [US; place_5.country]-led coalition of reckless behavior
    and "potential war crimes" in the fight against the [Islamic State group; military_org_1.name] in [Iraq; place_1.country]
    and [Syria; place_2.country]. While civilian casualties are still being assessed for [2018; temporal_1.year], a report
    from the monitoring group [Airwars; media_org_1.name] said the [US; place_5.country] and its allies may have killed up
    to [6000; number_4.int] civilians via strikes in [Iraq; place_1.country] and [Syria; place_2.country] in [2017; temporal_3.year]
    alone. The [US; place_5.country] has been waging a campaign against the [Islamic State group; military_org_1.name] since
    [August; temporal_4.month] [2014; temporal_4.year]. In [April; temporal_5.month], President [Donald Trump; person_2.full_name]
    also authorized missile strikes against [Syrian; place_2.nationality] President [Bashar al-Assad; person_3.full_name],
    targeting chemical weapons facilities in concert with the [French; place_6.nationality] and [British; place_7.nationality].
