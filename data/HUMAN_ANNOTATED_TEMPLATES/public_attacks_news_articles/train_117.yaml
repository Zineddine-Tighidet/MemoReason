  original_document: Utah student charged with bringing a bomb to schoolsuspicious incident. ST.GEORGE, Utah A 16-year-old
    southern Utah boy accused of bringing a homemade bomb to his high schoolreportedly told detectives he would have been
    fine with it if his bomb had detonated and killed or injured his classmates, according to court documents.If someone got
    hurt, I probably wouldn't care, the Hurricane teen told St.George police detectives, according to an information document
    filed by the Washington County Attorney's Office.The teen was charged Monday with attempted murder and use of a weapon
    of mass destruction, both first-degree felonies.He was also charged with two misdemeanors, graffiti and abuse of a flag,
    in connection with allegations that he vandalized another high school in February.Washington County Attorney Brock Belnap
    said Tuesday the teenager may be tried as an adult under the states Serious Youth Offender Act.The judge will determine
    whether the youth will be tried in adult court, he said. At 1 million plus strong, March for Our Lives rallies make powerful
    statement.
