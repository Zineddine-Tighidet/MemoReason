  document_theme: boston marathon bombing
  original_document: Boston Marathon Bomber Apologizes to SurvivorsBOSTON — Moments before a federal judge sentenced him to
    death, Boston Marathon bomber Dzhokhar Tsarnaev rose to his feet Wednesday and apologized to the victims and their loved
    ones for the first time. "I pray for your relief, for your healing,'' he said. Amid deep silence in the courtroom, the
    21-year-old ethnic Chechen said, "I am sorry for the lives that I've taken, for the suffering that I've caused you, for
    the damage that I've done — irreparable damage. ''It was the first time Tsarnaev, who did not speak in his own defense
    at trial, had addressed the court. After Tsarnaev finished, U.S. District Judge George O'Toole Jr. began to speak, with
    his voice breaking several times. He officially imposed the death sentence on Tsarnaev that jurors had recommended unanimously.
    In May, after a 12-week trial, Tsarnaev was found guilty of killing three people and injuring 264 in the April 15, 2013,
    bombing at the world-renowned race, where he and his brother, Tamerlan, 26, set off two pressure-cooker bombs near the
    finish line. Tsarnaev was also found guilty in the fatal shooting of a Massachusetts Institute of Technology police officer
    three days later as he and his brother fled. Tamerlan was killed during the getaway. Tsarnaev was found guilty of all
    30 terrorism and other charges against him. Of those, 17 carried the possibility of a death sentence. During the penalty
    phase of the judicial proceedings, prosecutors brushed off defense arguments that Tsarnaev was under the strong influence
    of his older, radicalized brother. Before the sentencing, a somber-looking Tsarnaev, wearing a dark sport jacket with
    a collared shirt and no tie, sat between his lawyers and listened as 24 people — some victims, some survivors — gave impact
    statements. They lashed out at him for his “cowardly” and “disgusting” acts, and several called upon him to apologize,
    trying to convince him that this would be his last chance to ask for forgiveness.
