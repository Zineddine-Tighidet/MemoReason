  wikipedia_url: https://en.wikipedia.org/wiki/France
  original_document: 'France, officially the French Republic, is a country primarily located in Western Europe. Its overseas
    regions and territories include French Guiana in South America, Saint Pierre and Miquelon in the North Atlantic, the French
    West Indies, and many islands in Oceania and the Indian Ocean. Metropolitan France shares borders with Belgium and Luxembourg
    to the north; Germany to the northeast; Switzerland to the east; Italy and Monaco to the southeast; Andorra and Spain
    to the south; and a maritime border with the United Kingdom to the northwest. Its metropolitan area extends from the Rhine
    to the Atlantic Ocean and from the Mediterranean Sea to the English Channel and the North Sea. Its 18 integral regions—five
    of which are overseas—span a combined area of 632702 km2 (244288 sq mi), with a total population estimated at 69.1 million
    in 2026. Its capital, largest city and main cultural and economic centre is Paris.


    Metropolitan France was settled during the Iron Age by Celtic tribes known as Gauls before Rome annexed the area in 51
    BC, leading to a distinct Gallo-Roman culture. In the Early Middle Ages, the Franks formed the kingdom of Francia, which
    became the heartland of the Carolingian Empire. The Treaty of Verdun of 843 partitioned the empire, with West Francia
    evolving into the Kingdom of France. In the High Middle Ages, France was a powerful but decentralised feudal kingdom,
    but from the mid-14th to the mid-15th centuries, France was plunged into a dynastic conflict with England known as the
    Hundred Years'' War. In the 16th century, French culture flourished during the French Renaissance, and a French colonial
    empire emerged. Internally, France was dominated by the conflict with the House of Habsburg and the French Wars of Religion
    between Catholics and Huguenots. France was successful in the Thirty Years'' War and further increased its influence during
    the reign of Louis XIV.


    The French Revolution of 1789 overthrew the Ancien Régime and produced the Declaration of the Rights of Man, which expresses
    the nation''s ideals to this day. France reached its political and military zenith in the early 19th century under Napoleon
    Bonaparte, subjugating much of continental Europe and establishing the First French Empire. Its collapse initiated a period
    of relative decline during which France endured the Bourbon Restoration until the founding of the French Second Republic,
    which was succeeded by the Second French Empire upon Napoleon III''s takeover. His empire collapsed during the Franco-Prussian
    War in 1870. This led to the establishment of the French Third Republic, and a period of economic prosperity and cultural
    and scientific flourishing known as the Belle Époque. France was one of the major participants of World War I, from which
    it emerged victorious at great human and economic cost. It was among the Allies of World War II, but it surrendered and
    was occupied by Germany in 1940. Following its liberation in 1944, the short-lived Fourth Republic was established and
    later dissolved over the course of the Algerian War. The current Fifth Republic, a semi-presidential system, was formed
    in 1958 by Charles de Gaulle. Algeria and most French colonies became independent in the 1960s, with the majority retaining
    close economic and military ties with France.


    France retains its centuries-long status as a global centre of art, science, and philosophy. It hosts the fourth-largest
    number of UNESCO World Heritage Sites, with 54 in total, and is the world''s leading tourist destination, having received
    over 100 million foreign visitors in 2024. A developed country, France has a high nominal per capita income globally,
    and its economy ranks among the largest in the world by both nominal GDP and PPP-adjusted GDP. It is a great power, being
    one of the five permanent members of the United Nations Security Council and an official nuclear-weapon state. The country
    is part of multiple international organisations and forums.'
