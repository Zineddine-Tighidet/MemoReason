  original_document: 'The European Union (EU) is a supranational political and economic union of 27 member states that are
    located primarily in Europe. The union has a total area of 4233255 km2 (1634469 sq mi) and an estimated population of
    more than 450 million as of 2025. The EU is often described as a sui generis political entity combining characteristics
    of both a federation and a confederation.


    Containing 5.5% of the world population in 2023, EU member states generated a nominal gross domestic product (GDP) of
    around €17.935 trillion in 2024, accounting for approximately one sixth of global economic output. Its cornerstone, the
    Customs Union, paved the way to establishing an internal single market based on standardised legal framework and legislation
    that applies in all member states in those matters, and only those matters, where the states have agreed to act as one.
    EU policies aim to ensure the free movement of people, goods, services and capital within the internal market; enact legislation
    in justice and home affairs; and maintain common policies on trade, agriculture, fisheries, and regional development.


    Passport controls have been abolished for travel within the Schengen Area. The eurozone is a group composed of the 21
    EU member states that have fully implemented the EU''s economic and monetary union and use the euro currency. Through
    the Common Foreign and Security Policy, the union has developed a role in external relations and defence. It maintains
    permanent diplomatic missions throughout the world and represents itself at the United Nations, the World Trade Organization,
    the G7 and the G20. In 2012, the EU was awarded the Nobel Peace Prize.


    The EU was established, along with its citizenship, when the Maastricht Treaty came into force in 1993, and was incorporated
    as an international legal juridical person upon entry into force of the Treaty of Lisbon in 2009. Its beginnings can be
    traced to the Inner Six states (Belgium, France, Italy, Luxembourg, the Netherlands, and West Germany) at the start of
    modern European integration in 1948, and to the Western Union, the International Authority for the Ruhr, the European
    Coal and Steel Community, the European Economic Community and the European Atomic Energy Community, which were established
    by treaties. These increasingly amalgamated bodies grew, with their legal successor the EU, both in size through the accessions
    of a further 22 states from 1973 to 2013, and in power through acquisitions of policy areas. In 2020, the United Kingdom
    became the only member state to leave the EU; ten countries are aspiring or negotiating to join it.'
