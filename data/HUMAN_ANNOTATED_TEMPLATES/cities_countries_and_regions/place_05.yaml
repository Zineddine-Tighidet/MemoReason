  original_document: 'The United Kingdom of Great Britain and Northern Ireland, commonly known as the United Kingdom (UK)
    or Britain, is a country in northwestern Europe, off the coast of the continental mainland. It comprises England, Scotland,
    Wales and Northern Ireland, with a population of over 69 million in 2024. The UK includes the island of Great Britain,
    the north-eastern part of the island of Ireland, and most of the smaller islands within the British Isles, covering 94354
    square miles (244376 km2). It shares a land border with the Republic of Ireland and is surrounded by the Atlantic Ocean,
    the North Sea, the English Channel, the Celtic Sea and the Irish Sea, while maintaining sovereignty over the Crown Dependencies
    and the British Overseas Territories. The capital and largest city of England and the UK is London; Edinburgh, Cardiff
    and Belfast are the national capitals of Scotland, Wales and Northern Ireland.


    Britain has been continuously inhabited since the Neolithic. In AD 43 the Roman conquest of Britain began. The Roman departure
    between 383 and 410 was followed by Anglo-Saxon settlement beginning around 450. In 1066 the Normans conquered England.
    Over the 17th century the role of the British monarchy was reduced, particularly as a result of the English Civil War.
    In 1707 the Kingdom of England and the Kingdom of Scotland united under the Treaty of Union to create the Kingdom of Great
    Britain. The Acts of Union 1800 incorporated the Kingdom of Ireland to create the United Kingdom of Great Britain and
    Ireland in 1801. Most of Ireland seceded from the UK in 1922 as the Irish Free State, and the Royal and Parliamentary
    Titles Act 1927 created the present United Kingdom.


    The UK became the first industrialised country and was the world''s foremost power for the majority of the 19th and early
    20th centuries, particularly during the Pax Britannica between 1815 and 1914. The British Empire was the leading economic
    power for most of the 19th century, a position supported by its agricultural prosperity, its role as a dominant trading
    nation, a massive industrial capacity, significant technological achievements, and the rise of 19th-century London as
    the world''s principal financial centre. At its height in the 1920s, the empire encompassed around a quarter of the world''s
    landmass and population, and was the largest in history. However, its involvement in the First World War and in the Second
    World War damaged Britain''s economic power, and a global wave of decolonisation led to the independence of most British
    colonies.


    The UK is a constitutional monarchy and parliamentary democracy with three distinct jurisdictions: England and Wales,
    Scotland, and Northern Ireland. Scotland, Wales and Northern Ireland have their own governments and parliaments which
    control various devolved matters. A developed country with an advanced economy, the UK ranks amongst the largest economies
    by nominal GDP and is one of the world''s largest exporters and importers. As a nuclear state with one of the highest
    defence budgets, the UK maintains one of the strongest militaries in Europe. Its soft power influence can be observed
    in the legal and political systems of many of its former colonies, and British culture remains globally influential, particularly
    in language, literature, music and sport. A great power, the UK is part of numerous international organisations.'
