  original_document: 'Germany, officially the Federal Republic of Germany, is a country in Western and Central Europe. It
    lies between the Baltic Sea and the North Sea to the north with the Alps to the south. Its sixteen constituent states
    have a total population of over 82 million, making it the most populous member state of the European Union. Germany borders
    Denmark to the north; Poland and the Czech Republic to the east; Austria and Switzerland to the south; and France, Luxembourg,
    Belgium, and the Netherlands to the west. The nation''s capital and most populous city is Berlin and its main financial
    centre is Frankfurt; the largest urban area is the Ruhr.


    Settlement in the territory of modern Germany began in the Lower Paleolithic, with various tribes inhabiting it from the
    Neolithic onward, chiefly the Celts, and Germanic tribes inhabiting the north. Romans named the area Germania. In 962,
    the Kingdom of Germany formed the bulk of the Holy Roman Empire. During the 16th century, northern German regions became
    the centre of the Protestant Reformation. Following the Napoleonic Wars and the dissolution of the Holy Roman Empire in
    1806, the German Confederation was formed in 1815.


    Unification of Germany into the modern nation-state, led by Prussia, established the German Empire in 1871. After World
    War I and a revolution, the Empire was replaced by the Weimar Republic. The Nazi rise to power in 1933 led to the establishment
    of a totalitarian dictatorship, World War II, and the Holocaust. In 1949, after the war and Allied occupation, Germany
    was organised into two separate polities with limited sovereignty: the Federal Republic of Germany (FRG), or West Germany,
    and the German Democratic Republic (GDR), or East Germany. The FRG was a founding member of the European Economic Community,
    while the GDR was a communist Eastern Bloc state and a founding member of the Warsaw Pact. After the fall of the communist
    led-government in East Germany, German reunification saw the former East German states join the FRG on 3 October 1990.


    Germany is a developed country with a strong economy; it has the largest economy in Europe by nominal GDP. As a major
    force in several industrial, scientific and technological sectors, Germany is both the world''s third-largest exporter
    and third-largest importer. Widely considered a great power, Germany is part of multiple international organisations and
    forums. It has the third-highest number of UNESCO World Heritage Sites: 55, of which 52 are cultural.'
