  original_document: 'India, officially the Republic of India, is a country in South Asia. It is the seventh-largest country
    by area; the most populous country since 2023; and, since its independence in 1947, the world''s most populous democracy.
    Bounded by the Indian Ocean on the south, the Arabian Sea on the southwest, and the Bay of Bengal on the southeast, it
    shares land borders with Pakistan to the west; China, Nepal, and Bhutan to the north; and Bangladesh and Myanmar to the
    east. In the Indian Ocean, India is near Sri Lanka and the Maldives; its Andaman and Nicobar Islands share a maritime
    border with Myanmar, Thailand, and Indonesia.


    Modern humans arrived on the Indian subcontinent from Africa no later than 55000 years ago. Their long occupation, predominantly
    in isolation as hunter-gatherers, has made the region highly diverse. Settled life emerged on the subcontinent in the
    western margins of the Indus river basin 9000 years ago, evolving gradually into the Indus Valley Civilisation of the
    third millennium BCE. By 1200 BCE, an archaic form of Sanskrit, an Indo-European language, had diffused into India from
    the northwest. Its hymns recorded the early dawnings of Hinduism in India. India''s pre-existing Dravidian languages were
    supplanted in the northern regions. By 400 BCE, caste had emerged within Hinduism, and Buddhism and Jainism had arisen,
    proclaiming social orders unlinked to heredity. Early political consolidations gave rise to the loose-knit Maurya and
    Gupta Empires. This era was noted for creativity in art, architecture, and writing, but the status of women declined,
    and untouchability became an organised belief. In South India, the Middle kingdoms exported Dravidian language scripts
    and religious cultures to the kingdoms of Southeast Asia.


    In the 1st millennium, Islam, Christianity, Judaism, and Zoroastrianism became established on India''s southern and western
    coasts. In the early centuries of the 2nd millennium Muslim armies from Central Asia intermittently overran India''s northern
    plains. The resulting Delhi Sultanate drew northern India into the cosmopolitan networks of medieval Islam. In south India,
    the Vijayanagara Empire created a long-lasting composite Hindu culture. In the Punjab, Sikhism emerged, rejecting institutionalised
    religion. The Mughal Empire ushered in two centuries of economic expansion and relative peace, and left a rich architectural
    legacy. Gradually expanding rule of the British East India Company turned India into a colonial economy but consolidated
    its sovereignty. British Crown rule began in 1858. The rights promised to Indians were granted slowly, but technological
    changes were introduced, and modern ideas of education and the public life took root. A nationalist movement emerged in
    India, the first in the non-European British Empire and an influence on other nationalist movements. Noted for nonviolent
    resistance after 1920, it became the primary factor in ending British rule. In 1947, the British Indian Empire was partitioned
    into two independent dominions, a Hindu-majority dominion of India and a Muslim-majority dominion of Pakistan. A large-scale
    loss of life and an unprecedented migration accompanied the partition.


    India has been a federal republic since 1950, governed through a democratic parliamentary system. It is a pluralistic,
    multilingual and multi-ethnic society. India''s population grew from 361 million in 1951 to over 1.4 billion in 2023.
    During this time, its nominal per capita income increased from US$64 annually to US$2601, and its literacy rate from 16.6%
    to 74%. A comparatively destitute country in 1951, India has become a fast-growing major economy and a hub for information
    technology services, with an expanding middle class. India has reduced its poverty rate, though at the cost of increasing
    economic inequality. It is a nuclear-weapon state that ranks high in military expenditure. It has disputes over Kashmir
    with its neighbours, Pakistan and China, unresolved since the mid-20th century. Among the socio-economic challenges India
    faces are gender inequality, child malnutrition, and rising levels of air pollution. India''s land is megadiverse with
    four biodiversity hotspots. India''s wildlife, which has traditionally been viewed with tolerance in its culture, is supported
    in protected habitats.'
