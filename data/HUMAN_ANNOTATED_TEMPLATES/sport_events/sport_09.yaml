  wikipedia_title: Wimbledon Championships
  wikipedia_url: https://en.wikipedia.org/wiki/Wimbledon_Championships
  original_document: 'The Wimbledon Championships, commonly called Wimbledon, is a tennis tournament organised by the All
    England Lawn Tennis and Croquet Club in collaboration with the Lawn Tennis Association annually in Wimbledon, London.
    It is chronologically the third of the four Grand Slam tennis events each year, held after the Australian Open and the
    French Open and before the US Open. It is the oldest tennis tournament in the world and is widely regarded as the most
    prestigious.


    Wimbledon has been held since 1877 and is played on outdoor grass courts; it is the only tennis major still played on
    grass, the traditional surface. It is also the only major that retains a night-time curfew for logistical reasons, with
    matches continuing until 23:00 BST under floodlighting since 2009.


    The tournament traditionally takes place over two weeks in late June and early July, starting either on the last Monday
    in June or the first Monday in July and culminating with the Ladies'' and Gentlemen''s Singles Finals, scheduled for the
    Saturday and Sunday at the end of the second week. Five major events are held each year, with additional junior and invitational
    competitions also taking place. In 2009, Wimbledon''s Centre Court was fitted with a retractable roof to reduce the loss
    of playing time due to rain. A roof was operational over No. 1 Court from 2019, when a number of other improvements were
    made, including adding cushioned seating, an Aorangi player warm-up area, a table and 10 independently operable cameras
    per court to capture the games.


    Wimbledon traditions include a strict all-white dress code for competitors, and royal patronage. Strawberries and cream
    are traditionally consumed at the tournament, in latter years accompanied by champagne. Unlike other tournaments, advertising
    is minimal and low-key from official suppliers such as Slazenger and Rolex. The relationship with Slazenger is the world''s
    longest-running sporting sponsorship, providing balls for the tournament since 1902.


    Due to the COVID-19 pandemic, Wimbledon 2020 was cancelled, the first cancellation of the tournament since World War II.
    The rescheduled 134th edition was staged from 28 June 2021 to 11 July 2021. The 135th edition was played between 27 June
    2022 and 10 July 2022, and regularly scheduled play occurred in the middle Sunday for the first time. It marked the centenary
    of the inaugural championships staged at the Centre Court. The ATP, ITF, and WTA did not award ranking points for the
    2022 tournament, due to controversy over the tournament excluding players representing Russia and Belarus.


    The 2025 Wimbledon Championships ran from 30 June to 13 July. For the first time in the tournament''s 147-year history,
    all in-person line judges were replaced by electronic line calling systems. The event also saw a historic British triumph,
    as Julian Cash and Lloyd Glasspool became the first all-British men''s doubles champions since 1936.


    The 2026 Wimbledon Championships will run from 29 June to 12 July.'
