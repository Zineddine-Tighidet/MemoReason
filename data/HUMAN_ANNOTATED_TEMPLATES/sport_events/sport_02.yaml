  wikipedia_url: https://en.wikipedia.org/wiki/Cricket_World_Cup
  original_document: 'The ICC Men''s Cricket World Cup is a quadrennial world cup for cricket in One Day International (ODI)
    format, organised by the International Cricket Council (ICC). The tournament is one of the world''s most viewed sporting
    events and considered the flagship event of the international cricket calendar by the ICC.


    The first Cricket World Cup was organised in England in June 1975, with the first ODI cricket match having been played
    only four years earlier. However, a separate Women''s Cricket World Cup had been held two years before the first men''s
    tournament, and a tournament involving multiple international teams had been held as early as 1912, when a triangular
    tournament of Test matches was played between Australia, England and South Africa. The first three World Cups were held
    in England. From the 1987 tournament onwards, hosting has been shared between countries under an unofficial rotation system,
    with 14 ICC members having hosted at least one match in the tournament.


    The current format involves a qualification phase, which takes place over the preceding three years, to determine which
    teams qualify for the tournament phase. In the tournament phase, 10 teams, including the automatically qualifying host
    nation, compete for the title at venues within the host nation over about a month. In the 2027 World Cup, the format will
    be changed to accommodate an expanded 14-team final competition.


    A total of twenty teams have competed in the 13 editions of the tournament, with ten teams competing in the recent 2023
    tournament. Australia has won the tournament six times, India and West Indies twice each, while Pakistan, Sri Lanka and
    England have won it once each. The best performance by a non-full-member team came when Kenya made the semi-finals of
    the 2003 tournament.


    Australia are the current champions after winning the 2023 World Cup in India. The subsequent 2027 World Cup will be held
    jointly in South Africa, Zimbabwe and Namibia.'
