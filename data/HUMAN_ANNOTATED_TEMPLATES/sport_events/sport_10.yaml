  wikipedia_url: https://en.wikipedia.org/wiki/Copa_Am%C3%A9rica
  original_document: 'The CONMEBOL Copa América (English: American Cup; known until 1975 as the South American Football Championship),
    often simply called the Copa America, is the top men''s quadrennial football tournament contested among national teams
    from South America. It is the oldest still-running continental football competition. The competition determines the champions
    of South America, minus Suriname, Guyana and French Guiana. Since the 1990s, teams from North America and Asia have also
    been invited to compete.


    Eight of the ten CONMEBOL national teams have won the tournament at least once in its 48 stagings since the event''s inauguration
    in 1916, with Ecuador and Venezuela the only teams yet to win. Argentina have the most championships in the tournament''s
    history, with 16 cups. The country that hosted the tournament the most times (nine editions) is Argentina, including the
    inaugural edition in 1916. The United States is the only non-CONMEBOL country that hosted the event, having done so in
    both 2016 and 2024. On three occasions (in 1975, 1979, and 1983), the tournament was held in multiple South American countries.


    Since 1993, the tournament has generally featured 12 teams — all 10 CONMEBOL teams and two additional teams from other
    confederations. Mexico participated in every tournament between 1993 and 2016, with one additional team drawn from CONCACAF,
    except for 1999, when AFC team Japan filled out the 12-team roster, and 2019, which featured Japan and Qatar. The 2016
    and 2024 tournaments both featured 16 teams, with six teams from CONCACAF in addition to the 10 from CONMEBOL.'
