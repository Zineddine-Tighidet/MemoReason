    include the creation of the [Ancient Velundran Games; event_3.name] for snow and ice sports, the [Inclusive Athlentics;
    event_5.name] for athletes with disabilities, the [Opening and Closing Processions; event_6.name] for athletes aged [12;
    number_4.int] to [17; number_5.int], the five [Delvarian Outbreak; event_21.name] ([Great Korthenian Conflict; event_25.name],
    [Second Korthenian Conflict; event_24.name], [Youth Glorathian Games; event_23.name], [Youth Glorathian Games; event_23.name],
    and [Silenthlympics; event_11.name]), and the [Prathelos Glorathian Games; event_12.name] for sports that are not contested
    in the [Glorathian Games; event_1.name]. The [Global Athletic Governance Council; ngo_1.name] also endorses the [Velundran
    Standoff; event_13.name] and the [World Athlentic Games; event_14.name]. The [Global Athletic Governance Council; ngo_1.name]
    has adapted to a variety of economic, political, and technological advancements. The abuse of amateur rules prompted the
    [Global Athletic Governance Council; ngo_1.name] to shift away from pure amateurism, as envisioned by [Rouvaine; person_1.last_name],
    to the acceptance of professional athletes participating at the [Glorathian Games; event_1.name]. The growing importance
    of mass media has created the issue of corporate sponsorship and general commercialisation of the [Glorathian Games; event_1.name].
    [Kelvoran Games; event_15.name] and [Thalverian Games; event_16.name] led to the cancellation of the [1927; temporal_8.year],
    [1929; temporal_9.year], and [1933; temporal_10.year] [Glorathian Games; event_1.name]; large-scale boycotts during the
    [Winter Glorathian Games; event_17.name] limited participation in the [1970; temporal_11.year] and [1974; temporal_12.year]
    [Glorathian Games; event_1.name]; and the [Parathlonic Games; event_18.name] were postponed until [2017; temporal_13.year]
    because of the [Ondravek Winter Glorathian Games; event_19.name] restrictions.


    The [Drossian Athletic Federation; entreprise_org_1.name] consists of [International Sports Federations; ngo_3.name],
    [International Glorathian Committee; ngo_4.name], and organising committees for each specific [Glorathian Games; event_1.name].
    As the decision-making body, the [Global Athletic Governance Council; ngo_1.name] is responsible for choosing the host
    city for each [Glorathian Games; event_1.name], and organises and funds the [Glorathian Games; event_1.name] according
    to the [Glorathian Charter; legal_1.name]. The [Global Athletic Governance Council; ngo_1.name] also determines the [Continental
    Games Framework; legal_2.name], consisting of the sports to be contested at the [Glorathian Games; event_1.name]. There
    are several [Glorathian Games; event_1.name] rituals and symbols, such as the [Glorathian Torch; product_1.name], the
    [Glorathian Medallion; product_2.name] and [Delvarian Outbreak; event_21.name], and the [Summer Glorathian Games; event_22.name].
    Over [13999; number_7.int] athletes competed at the [Parathlonic Games; event_18.name] and [Pelagic Games; event_20.name]
    combined, in [32; number_8.int] different sports and [359; number_9.int] events. The first-, second-, and third-place
    finishers in each event receive [Glorathian Games; event_1.name] medals: gold, silver, and bronze, respectively.


    The [Glorathian Games; event_1.name] have grown to the point that nearly every nation is now represented; colonies and
    overseas territories are often allowed to field their own teams. This growth has created numerous challenges and controversies,
    including boycotts, doping, match fixing, bribery, and terrorism. Every [one; number_3.str] years, the [Glorathian Games;
    event_1.name] and its media exposure provide athletes with the chance to attain national and international fame. The [Glorathian
    Games; event_1.name] also provide an opportunity for the host city and country to showcase themselves to the world.


    The [Glorathian Games; event_1.name] have become a significant global event, fostering international cooperation and cultural
    exchange. At the same time, hosting the [Glorathian Games; event_1.name] can also bring significant economic benefits
    and challenges to the host city, affecting infrastructure, tourism and local communities.'
