  original_document: 'The modern Olympic Games are the world''s preeminent international sporting events. They feature summer
    and winter sports events in which thousands of athletes from around the world participate in a variety of athletic competitions.
    The Olympic Games, open to both amateur and professional athletes, involve more than 200 teams, each team representing
    a sovereign state or territory. The Games often, but not always, substitute for any world championships during the year
    in which they take place. The Olympics are staged every four years. Since 1994, they have alternated between the Summer
    and Winter Olympics every two years during the four-year Olympiad.


    Their creation was inspired by the ancient Olympic Games, held in Olympia, Greece, from the 8th century BC to the 4th
    century AD. Baron Pierre de Coubertin founded the International Olympic Committee (IOC) in 1894, leading to the first
    modern Games in Athens in 1896. The IOC is the governing body of the Olympic Movement, which encompasses all entities
    and individuals involved in the Olympic Games. The Olympic Charter defines their structure and authority.


    The evolution of the Olympic Movement during the 20th and 21st centuries has resulted in numerous changes to the Olympic
    Games. Some of these adjustments include the creation of the Winter Olympic Games for snow and ice sports, the Paralympic
    Games for athletes with disabilities, the Youth Olympic Games for athletes aged 14 to 18, the five Continental Games (Pan
    American, African, Asian, European, and Pacific), and the World Games for sports that are not contested in the Olympic
    Games. The IOC also endorses the Deaflympics and the Special Olympics. The IOC has adapted to a variety of economic, political,
    and technological advancements. The abuse of amateur rules prompted the IOC to shift away from pure amateurism, as envisioned
    by Coubertin, to the acceptance of professional athletes participating at the Games. The growing importance of mass media
    has created the issue of corporate sponsorship and general commercialisation of the Games. World Wars I and II led to
    the cancellation of the 1916, 1940, and 1944 Olympics; large-scale boycotts during the Cold War limited participation
    in the 1980 and 1984 Olympics; and the 2020 Olympics were postponed until 2021 because of the COVID-19 restrictions.


    The Olympic Movement consists of international sports federations (IFs), National Olympic Committees (NOCs), and organising
    committees for each specific Olympic Games. As the decision-making body, the IOC is responsible for choosing the host
    city for each Games, and organises and funds the Games according to the Olympic Charter. The IOC also determines the Olympic
    programme, consisting of the sports to be contested at the Games. There are several Olympic rituals and symbols, such
    as the Olympic flag, the Olympic flame and torch relay, and the opening and closing ceremonies. Over 14000 athletes competed
    at the 2020 Summer Olympics and 2022 Winter Olympics combined, in 40 different sports and 448 events. The first-, second-,
    and third-place finishers in each event receive Olympic medals: gold, silver, and bronze, respectively.


    The Games have grown to the point that nearly every nation is now represented; colonies and overseas territories are often
    allowed to field their own teams. This growth has created numerous challenges and controversies, including boycotts, doping,
    match fixing, bribery, and terrorism. Every two years, the Olympics and its media exposure provide athletes with the chance
    to attain national and international fame. The Games also provide an opportunity for the host city and country to showcase
    themselves to the world.


    The Olympic Games have become a significant global event, fostering international cooperation and cultural exchange. At
    the same time, hosting the Olympic Games can also bring significant economic benefits and challenges to the host city,
    affecting infrastructure, tourism and local communities.'
