  original_document: 'The Apollo program, also known as Project Apollo, was the United States human spaceflight program led
    by NASA, which landed the first humans on the Moon in 1969. Apollo was conceived during Project Mercury and executed after
    Project Gemini. It was conceived in 1960 as a three-person spacecraft during the presidency of Dwight D. Eisenhower. Apollo
    was later dedicated to President John F. Kennedy''s national goal for the 1960s of "landing a man on the Moon and returning
    him safely to the Earth" in an address to the U.S. Congress on May 25, 1961.


    Kennedy''s goal was accomplished on the Apollo 11 mission, when astronauts Neil Armstrong and Buzz Aldrin landed their
    Apollo Lunar Module (LM) on July 20, 1969, and walked on the lunar surface, while Michael Collins remained in lunar orbit
    in the command and service module (CSM), and all three landed safely on Earth in the Pacific Ocean on July 24. Five subsequent
    Apollo missions also landed astronauts on the Moon, the last, Apollo 17, in December 1972. In these six spaceflights,
    twelve people walked on the Moon.


    Apollo ran from 1961 to 1972, with the first crewed flight in 1968. It encountered a major setback in 1967 when the Apollo
    1 cabin fire killed the entire crew during a prelaunch test. After the first Moon landing, sufficient flight hardware
    remained for nine follow-on landings with a plan for extended lunar geological and astrophysical exploration. Budget cuts
    forced the cancellation of three of these. Five of the remaining six missions achieved landings; but the Apollo 13 landing
    had to be aborted after an oxygen tank exploded en route to the Moon, crippling the CSM. The crew barely managed a safe
    return to Earth by using the Lunar Module as a "lifeboat" on the return journey.


    Apollo used the Saturn family of rockets as launch vehicles, which were also used for an Apollo Applications Program,
    which consisted of Skylab, a space station that supported three crewed missions in 1973–1974, and the Apollo–Soyuz Test
    Project, a joint United States-Soviet Union low Earth orbit mission in 1975.


    Apollo set several major human spaceflight milestones. It stands alone in sending crewed missions beyond low Earth orbit.
    Apollo 8 was the first crewed spacecraft to orbit another celestial body, and Apollo 11 was the first crewed spacecraft
    to land humans on one.'
