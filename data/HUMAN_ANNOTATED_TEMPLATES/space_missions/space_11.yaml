  wikipedia_url: https://en.wikipedia.org/wiki/Luna_programme
  original_document: 'The Luna programme (from the Russian word Луна "Luna" meaning "Moon"), sometimes called Lunik by western
    media, was a series of robotic spacecraft missions sent to the Moon by the Soviet Union between 1959 and 1976. The programme
    accomplished many firsts in space exploration, including first flyby of the Moon, first impact of the Moon and first photos
    of the far side of the Moon. Each mission was designed as either an orbiter or lander. They also performed many experiments,
    studying the Moon''s chemical composition, gravity, temperature, and radiation.


    Twenty-four spacecraft were formally given the Luna designation, although more were launched. Those that failed to reach
    orbit were not publicly acknowledged at the time, and not assigned a Luna number. Those that failed in low Earth orbit
    were usually given Cosmos designations. The estimated cost of the Luna programme in 1964 was US$6–10 billion (equivalent
    to US$46–77 billion in 2024). The Luna 25 mission also continues the Luna designation, although it is considered to be
    a part of the Luna-Glob exploration programme. The same applies to other planned missions such as Luna 26, Luna 27 and
    Luna 28.'
