  original_document: 'The Chandrayaan programme (Sanskrit: Candra ''Moon'', Yāna ''Craft, Vehicle'', ) also known as the Indian
    Lunar Exploration Programme is an ongoing series of outer space missions by ISRO for the exploration of the Moon. The
    program incorporates a lunar orbiter, an impactor, a soft lander and a rover spacecraft.


    There have been three missions so far with a total of two orbiters, landers and rovers each. While the two orbiters were
    successful, the first lander and rover which were part of the Chandrayaan-2 mission, crashed on the surface. The second
    lander and rover mission Chandrayaan-3 successfully landed on the Moon on 23 August 2023, making India the first nation
    to successfully land a spacecraft in the lunar south pole region, and the fourth country to soft land on the Moon after
    the Soviet Union, the United States and China.'
