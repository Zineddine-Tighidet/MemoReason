  wikipedia_url: https://en.wikipedia.org/wiki/Mars_Express
  original_document: 'Mars Express is a space exploration mission by the European Space Agency (ESA) exploring the planet
    Mars and its moons since 2003, and the first planetary mission attempted by ESA.


    Mars Express consisted of two parts, the Mars Express Orbiter and Beagle 2, a lander designed to perform exobiology and
    geochemistry research. Although the lander failed to fully deploy after it landed on the Martian surface, the orbiter
    has been successfully performing scientific measurements since early 2004, namely, high-resolution imaging and mineralogical
    mapping of the surface, radar sounding of the subsurface structure down to the permafrost, precise determination of the
    atmospheric circulation and composition, and study of the interaction of the atmosphere with the interplanetary medium.


    Due to the valuable science return and the highly flexible mission profile, Mars Express has been granted several mission
    extensions. The latest was approved on March 7, 2023, consisting of a confirmed operating period until December 31, 2026,
    and a further provisional extension to December 31, 2028. Arriving at Mars in 2003, 22 years and 2 months ago (and counting),
    it is the second longest surviving, continually active spacecraft in orbit around a planet other than Earth, behind only
    NASA''s still active 2001 Mars Odyssey.'
