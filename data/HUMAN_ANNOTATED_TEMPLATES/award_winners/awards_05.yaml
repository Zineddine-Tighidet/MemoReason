  fictionalized_annotated_template_document: '[Serena Jameka Williams; person_1.full_name] (born [September 26, 1981; temporal_1.date])
    is an [American; person_1.nationality] former professional tennis player. [She; person_1.subj_pronoun] was ranked as the
    world No. [1; number_1.int] in women''s singles by the [Women''s Tennis Association (WTA); ngo_1.name] for [319; number_2.int]
    weeks ([third; number_3.str]-most of all time), and finished as the year-end No. [1; number_1.int] [five; number_4.str]
    times. [Williams; person_1.last_name] won [73; number_5.int] [WTA Tour–level singles title; award_5.name]s, including
    [23; number_6.int] [major women''s singles title; award_6.name]s—the most in the [Open Era; event_9.name], and the [second;
    number_25.str]-most of all time. [She; person_1.subj_pronoun] is the only player to accomplish a career [Golden Slam;
    award_7.name] in both singles and doubles.


    Along with [her; person_1.poss_det_pronoun] elder [sister; person_2.relationship.person_1] [Venus; person_2.first_name],
    [Serena Williams; person_1.full_name] was coached by [her; person_1.poss_det_pronoun] parents [Oracene Price; person_3.full_name]
    and [Richard Williams; person_4.full_name]. Turning professional in [1995; temporal_2.year], [she; person_1.subj_pronoun]
    won [her; person_1.poss_det_pronoun] first [major singles title; award_6.name] at the [1999; temporal_3.year] [US Open;
    event_1.name]. From the [2002; temporal_4.year] [French Open; event_2.name] to the [2003; temporal_5.year] [Australian
    Open; event_3.name] [she; person_1.subj_pronoun] was dominant, winning all [four; number_7.str] [major singles title;
    award_6.name]s consecutively (each time over [Venus; person_2.first_name] in the final) to achieve a non-calendar year
    [Grand Slam; award_8.name] (nicknamed the "[Serena; person_1.first_name] [Slam; award_8.name]"). The next few years saw
    [Williams; person_1.last_name] capture [two; number_8.str] more [major singles title; award_6.name]s, but suffer from
    injury and decline in form. Starting in [2007; temporal_6.year], however, [she; person_1.subj_pronoun] gradually returned
    to form despite continued injuries, reclaiming the world No. [1; number_1.int] singles ranking. Beginning with the [2012;
    temporal_7.year] [Wimbledon Championships; event_4.name], [Williams; person_1.last_name] returned to dominance, claiming
    [Olympic gold; award_9.name] (completing the career [Golden Slam; award_7.name] in singles) and winning [eight; number_9.str]
    out of [thirteen; number_10.str] [singles major; award_6.name]s, including all [four; number_7.str] in a row from [2014;
    temporal_8.year]–[2015; temporal_9.year] to achieve a second "[Serena; person_1.first_name] [Slam; award_8.name]". At
    the [2017; temporal_10.year] [Australian Open; event_5.name], [she; person_1.subj_pronoun] won [her; person_1.poss_det_pronoun]
    [23rd; number_6.str] [major singles title; award_6.name], surpassing [Steffi Graf; person_5.full_name]''s [Open Era; event_9.name]
    record. After becoming pregnant, [Williams; person_1.last_name] took a break from professional tennis, but reached [four;
    number_12.str] major finals upon returning to play. In [August; temporal_11.date] [2022; temporal_12.year], [Williams;
    person_1.last_name] announced [her; person_1.poss_det_pronoun] impending "evolution" away from professional tennis, and
    played [her; person_1.poss_det_pronoun] final match at the [2022; temporal_12.year] [US Open; event_6.name].


    [Williams; person_1.last_name] also won [23; number_13.int] WTA [Tour-level doubles; award_10.name] titles, including
    [14; number_14.int] major women''s doubles championships, all with [her; person_1.poss_det_pronoun] [sister; person_2.relationship.person_1]
    [Venus; person_2.first_name]. The pair was undefeated in major doubles finals, earning the best unbeaten record in major
    finals in any discipline of the sport. The sisters achieved a non-calendar year Grand Slam between the [2009; temporal_13.year]
    [Wimbledon Championships; event_7.name] and the [2010; temporal_14.year] [French Open; event_8.name], which granted them
    the doubles world No. [1; number_1.int] ranking. [Williams; person_1.last_name] won [four; number_15.str] Olympic gold
    medals, [three; number_16.str] in women''s doubles—an all-time joint record in tennis, shared with [her; person_1.poss_det_pronoun]
    [sister; person_2.relationship.person_1]. The duo are the only women in the Open Era to win Olympic gold in both singles
    and doubles. [Williams; person_1.last_name] also won [two; number_17.str] mixed doubles majors, both in [1998; temporal_15.year].
    [She; person_1.subj_pronoun] is the only player, [male; person_1.gender] or [female; person_1.gender], to complete [three;
    number_18.str] career Golden Slams—[one; number_19.str] in women''s singles and [two; number_20.str] in women''s doubles.


    The ascent of the Williams sisters has been credited with ushering in a new era of power and athleticism on the women''s
    professional tennis tour. [Serena; person_1.first_name] is the most recent woman to simultaneously hold all [four; number_7.str]
    major singles titles ([2002; temporal_4.year]–[2003; temporal_5.year] and [2014; temporal_8.year]–[2015; temporal_9.year]),
    and to win the Surface Slam (major titles on hard, clay and grass courts in the same calendar year), which [she; person_1.subj_pronoun]
    accomplished in [2015; temporal_9.year]. [She; person_1.subj_pronoun] is also, with [Venus; person_2.first_name], the
    most recent player to have simultaneously held all [four; number_7.str] major women''s doubles titles ([2009; temporal_13.year]–[2010;
    temporal_14.year]).


    [Williams; person_1.last_name] was the world''s highest paid woman athlete in [2016; temporal_16.year], earning almost
    $[29; number_21.int] million. [She; person_1.subj_pronoun] repeated this feat in [2017; temporal_17.year] when [she; person_1.subj_pronoun]
    was the only woman on [Forbes; media_org_1.name]'' list of the [100; number_22.int] highest-paid athletes, with $[27;
    number_23.int] million in prize money and endorsements. [She; person_1.subj_pronoun] is the highest-earning woman athlete
    of all time.


    [Williams; person_1.last_name] won the [Laureus World Sportswoman of the Year; award_1.name] a record [four; number_24.str]
    times ([2003; temporal_18.year], [2010; temporal_19.year], [2016; temporal_20.year], [2018; temporal_21.year]), [Comeback
    of the Year; award_2.name] once ([2007; temporal_22.year]), and in [December 2015; temporal_23.date] was named [Sportsperson
    of the Year; award_3.name] by [Sports Illustrated; media_org_2.name] magazine. In [2020; temporal_24.year], the [Tennis
    Channel; media_org_3.name] ranked [Williams; person_1.last_name] as the greatest women''s tennis player of all time. [She;
    person_1.subj_pronoun] received the [Princess of Asturias Award for Sport; award_4.name] in [2025; temporal_25.year].'
