  wikipedia_url: https://en.wikipedia.org/wiki/Serena_Williams
  original_document: 'Serena Jameka Williams (born September 26, 1981) is an American former professional tennis player. She
    was ranked as the world No. 1 in women''s singles by the Women''s Tennis Association (WTA) for 319 weeks (third-most of
    all time), and finished as the year-end No. 1 five times. Williams won 73 WTA Tour–level singles titles, including 23
    major women''s singles titles—the most in the Open Era, and the second-most of all time. She is the only player to accomplish
    a career Golden Slam in both singles and doubles.


    Along with her elder sister Venus, Serena Williams was coached by her parents Oracene Price and Richard Williams. Turning
    professional in 1995, she won her first major singles title at the 1999 US Open. From the 2002 French Open to the 2003
    Australian Open she was dominant, winning all four major singles titles consecutively (each time over Venus in the final)
    to achieve a non-calendar year Grand Slam (nicknamed the "Serena Slam"). The next few years saw Williams capture two more
    major singles titles, but suffer from injury and decline in form. Starting in 2007, however, she gradually returned to
    form despite continued injuries, reclaiming the world No. 1 singles ranking. Beginning with the 2012 Wimbledon Championships,
    Williams returned to dominance, claiming Olympic gold (completing the career Golden Slam in singles) and winning eight
    out of thirteen singles majors, including all four in a row from 2014–2015 to achieve a second "Serena Slam". At the 2017
    Australian Open, she won her 23rd major singles title, surpassing Steffi Graf''s Open Era record. After becoming pregnant,
    Williams took a break from professional tennis, but reached four major finals upon returning to play. In August 2022,
    Williams announced her impending "evolution" away from professional tennis, and played her final match at the 2022 US
    Open.


    Williams also won 23 WTA Tour-level doubles titles, including 14 major women''s doubles championships, all with her sister
    Venus. The pair was undefeated in major doubles finals, earning the best unbeaten record in major finals in any discipline
    of the sport. The sisters achieved a non-calendar year Grand Slam between the 2009 Wimbledon Championships and the 2010
    French Open, which granted them the doubles world No. 1 ranking. Williams won four Olympic gold medals, three in women''s
    doubles—an all-time joint record in tennis, shared with her sister. The duo are the only women in the Open Era to win
    Olympic gold in both singles and doubles. Williams also won two mixed doubles majors, both in 1998. She is the only player,
    male or female, to complete three career Golden Slams—one in women''s singles and two in women''s doubles.


    The ascent of the Williams sisters has been credited with ushering in a new era of power and athleticism on the women''s
    professional tennis tour. Serena is the most recent woman to simultaneously hold all four major singles titles (2002–2003
    and 2014–2015), and to win the Surface Slam (major titles on hard, clay and grass courts in the same calendar year), which
    she accomplished in 2015. She is also, with Venus, the most recent player to have simultaneously held all four major women''s
    doubles titles (2009–2010).


    Williams was the world''s highest paid woman athlete in 2016, earning almost $29 million. She repeated this feat in 2017
    when she was the only woman on Forbes'' list of the 100 highest-paid athletes, with $27 million in prize money and endorsements.
    She is the highest-earning woman athlete of all time.


    Williams won the Laureus World Sportswoman of the Year a record four times (2003, 2010, 2016, 2018), Comeback of the Year
    once (2007), and in December 2015 was named Sportsperson of the Year by Sports Illustrated magazine. In 2020, the Tennis
    Channel ranked Williams as the greatest women''s tennis player of all time. She received the Princess of Asturias Award
    for Sport in 2025.'
