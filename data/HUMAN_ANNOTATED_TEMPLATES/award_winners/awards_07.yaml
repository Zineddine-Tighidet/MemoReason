  original_document: 'Nadia Murad Basee Taha is an Iraqi-born Yazidi human rights activist based in Germany. In 2014, during
    the Yazidi genocide by the Islamic State, she was abducted from her hometown of Kocho in Iraq. Much of her community was
    massacred. After losing most of her family, Murad was held as an Islamic State sex slave for three months, alongside thousands
    of other Yazidi women and girls.


    Murad is the founder of Nadia''s Initiative, a non-profit organization dedicated to "helping women and children victimized
    by genocide, mass atrocities, and human trafficking to heal and rebuild their lives and communities". Its establishment
    was prompted by the Sinjar massacre.


    In 2018, she and Congolese gynecologist Denis Mukwege were jointly awarded the Nobel Peace Prize for "their efforts to
    end the use of sexual violence as a weapon of war and armed conflict." She is the first Iraqi and Yazidi to have been
    awarded a Nobel Peace Prize.


    In 2016, Murad was appointed as the first-ever Goodwill Ambassador for the Dignity of Survivors of Human Trafficking for
    the United Nations Office on Drugs and Crime.'
