  original_document: 'Pfizer Inc. is an American multinational pharmaceutical and biotechnology corporation headquartered
    at The Spiral in Manhattan, New York City. Founded in 1849 in New York by German entrepreneurs Charles Pfizer (1824–1906)
    and Charles F. Erhart (1821–1891), Pfizer is one of the oldest pharmaceutical companies in North America.


    Pfizer develops and produces medication and vaccines for immunology, oncology, cardiology, endocrinology, and neurology.
    The company''s largest products by sales are Eliquis (apixaban) ($7.3 billion in 2024 revenues, 11% of total revenues),
    Prevnar (a pneumococcal conjugate vaccine) ($6.4 billion in 2024 revenues, 10% of total revenues), Paxlovid (Nirmatrelvir/ritonavir)
    ($5.7 billion in 2024 revenues, 9% of total revenues), Vyndaqel (tafamidis) ($5.4 billion in 2024 revenues, 8% of total
    revenues), Comirnaty (the Pfizer–BioNTech COVID-19 vaccine) ($5.3 billion in 2024 revenues, 8% of total revenues), and
    Ibrance (palbociclib) ($4.3 billion in 2024 revenues, 6% of total revenues). In 2024, 61% of the company''s revenues came
    from the United States, 4% came from China, and 35% came from other countries.


    The company is ranked fifth on the list of largest biomedical companies by revenue. It is ranked the 69th on the Fortune
    500 and 73rd on the Forbes Global 2000.'
