  original_document: 'The Coca-Cola Company is an American multinational corporation founded in 1892 headquartered in Atlanta,
    Georgia. It manufactures, sells and markets soft drinks including Coca-Cola, other non-alcoholic beverage concentrates
    and syrups, and alcoholic beverages. Its stock is listed on the New York Stock Exchange and is a component of the DJIA
    and the S&P 500 and S&P 100 indices.


    Coca-Cola was developed in 1886 by pharmacist John Stith Pemberton. At the time it was introduced, the product contained
    the stimulants cocaine from coca leaves and caffeine from kola nuts which together acted synergistically. The coca and
    the kola are the source of the product name and led to Coca-Cola''s promotion as a "healthy tonic". Pemberton had been
    severely wounded in the American Civil War and had become addicted to the pain medication morphine. At the time, cocaine
    was being promoted as a "cure" for opioid addiction, so he developed the beverage as a patent medicine in an effort to
    control his addiction.


    In 1889, the formula and brand were sold for $2300 (equivalent to $73000 in 2024) to Asa Griggs Candler, who incorporated
    the Coca-Cola Company in Atlanta in 1892. The company has operated a franchised distribution system since 1889. The company
    largely produces syrup concentrate, which is then sold to various bottlers throughout the world who hold exclusive territories.'
