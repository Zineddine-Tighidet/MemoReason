  original_document: 'Airbus SE is a European aerospace corporation. While the company''s primary business is the design and
    manufacture of commercial aircraft, it also operates separate divisions for Defence and Space and Helicopters. Airbus
    has long been the world''s leading helicopter manufacturer and, in 2019, emerged as the world''s largest manufacturer
    of airliners.


    Airbus originated from Airbus Industrie GIE, a consortium of European aerospace companies established in 1970 to produce
    a wide-body aircraft to compete with American-built airliners. In 2000, the consortium''s parent firms—Aérospatiale-Matra
    of France, DASA of Germany, and CASA of Spain—merged to form the European Aeronautic Defence and Space Company (EADS),
    which later acquired full ownership of Airbus Industrie. EADS rebranded as Airbus SE in 2015. Reflecting its multinational
    origins, the company operates offices and assembly plants in France, Germany, Spain, and the United Kingdom, along with
    more recent additions in Canada, Malaysia, the United States, Morocco, and India.


    Airbus''s headquarters are legally registered in Leiden, Netherlands, while day-to-day management is conducted from the
    company''s main office in Blagnac, France. The SE in its name denotes Societas Europaea, a public company under European
    Union corporate law. Airbus is led by CEO Guillaume Faury and is included in the EURO STOXX 50 stock market index. Since
    its inception in 2000, the company''s shares have been listed on the Paris, Frankfurt, and four Spanish stock exchanges,
    including the Bolsa de Madrid.'
