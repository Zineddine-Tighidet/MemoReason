  original_document: 'Amazon.com, Inc. (doing business as Amazon) is an American multinational technology company engaged
    in e-commerce, cloud computing, online advertising, digital streaming, and artificial intelligence. Founded in 1994 by
    Jeff Bezos in Bellevue, Washington, the company originally started as an online marketplace for books, but gradually expanded
    its offerings to include a wide range of product categories, referred to as "The Everything Store". Amazon has been described
    as a Big Tech company.


    It is mostly known as the world''s biggest online shopping retailer and marketplace, best known for a wide range of products
    and supplying multiple services. Amazon sells books, electronics, pharmacy, car parts, video games, dining, jewelry, food,
    music, and sports equipment.


    The company has multiple subsidiaries, including Amazon Web Services (or AWS), providing cloud computing; Zoox, a self-driving
    car division; Kuiper Systems, a satellite Internet provider; and Amazon Lab126, a computer hardware R&D provider. Other
    subsidiaries include Ring, Twitch, IMDb, and Whole Foods Market. Its acquisition of Whole Foods in August 2017 for US$13.4
    billion substantially increased its market share and presence as a physical retailer. Amazon also distributes a variety
    of downloadable and streaming content through its Amazon Prime Video, MGM+, Amazon Music, Twitch, Audible and Wondery
    units. It publishes books through its publishing arm, Amazon Publishing, produces and distributes film and television
    content through Amazon MGM Studios, including the Metro-Goldwyn-Mayer studio it acquired in March 2022, and owns Brilliance
    Audio and Audible, which produce and distribute audiobooks, respectively. Amazon also produces consumer electronics—most
    notably, Kindle e-readers, Echo devices, Fire tablets, and Fire TVs.


    Amazon has a reputation as a disruptor of industries through technological innovation and aggressive reinvestment of profits
    into capital expenditures. As of 2023, it is the world''s largest online retailer and marketplace, smart speaker provider,
    cloud computing service through AWS, live-streaming service through Twitch, and Internet company as measured by revenue
    and market share. In 2021, it surpassed Walmart as the world''s largest retailer outside of China, driven in large part
    by its paid subscription plan, Amazon Prime, which has 200 million subscribers worldwide. It is the second-largest private
    employer in the United States and the second-largest company in the world and in the U.S. by revenue as of 2024 (after
    Walmart). As of October 2024, Amazon is the 12th-most visited website in the world and 84% of its traffic comes from the
    United States. Amazon has been criticized for its business practices, including surveillance partnerships, poor worker
    conditions, anti-union efforts, environmental harm, anti-competitive behavior, censorship controversies, and exploitative
    treatment of small businesses and suppliers.'
