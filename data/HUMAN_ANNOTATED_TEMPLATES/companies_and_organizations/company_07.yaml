  original_document: 'Samsung Electronics Co., Ltd. is a South Korean multinational major appliance and consumer electronics
    corporation founded on 13 January 1969 and headquartered in Yeongtong District, Suwon, South Korea. It is the pinnacle
    of the Samsung chaebol, accounting for 70% of the group''s revenue in 2012, and has played a key role in the group''s
    corporate governance due to cross ownership. It is majority-owned by foreign investors.


    As of 2023, Samsung Electronics is the world''s fourth-largest technology company by revenue, and its market capitalization
    stood at US$520.65 billion, the 12th largest in the world. It is the second largest vendor of smartphones second to Apples
    iPhone. Samsung is known most notably for its Samsung Galaxy brand consisting of phones such as its flagship Galaxy S
    series, popular midrange Galaxy A series, budget Galaxy M series as well as the premium Galaxy Fold and Galaxy Flip series.
    The company pioneered the phablet form factor with the Galaxy Note family. Samsung produces tablets consisting of the
    Galaxy Tab A series and Galaxy Tab S series. It has been the largest television manufacturer since 2006, both of which
    include related software and services like Samsung Pay and TV Plus. Samsung is a supplier of hospitality televisions for
    hotels and businesses which includes dedicated software that can be personalised to each business and is a supplier of
    displays for stadiums and venues. Samsung is also a major vendor of washing machines, refrigerators, computer monitors
    and soundbars.


    Samsung Electronics is also a major manufacturer of electronic components such as lithium-ion batteries, semiconductors,
    image sensors, camera modules, and displays for clients such as Apple, Sony, HTC, and Nokia. It is the world''s largest
    semiconductor memory manufacturer and, from 2017 to 2018, was the largest semiconductor company in the world, briefly
    dethroning Intel, the decades-long champion. Samsung Electronics has assembly plants and sales networks in 76 countries
    and employs more than 260000 people.'
