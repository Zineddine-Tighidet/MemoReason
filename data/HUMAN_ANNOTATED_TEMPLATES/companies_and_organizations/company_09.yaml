  wikipedia_title: Apple Inc.
  wikipedia_url: https://en.wikipedia.org/wiki/Apple_Inc.
  original_document: 'Apple Inc. is an American multinational technology company headquartered in Cupertino, California, in
    Silicon Valley, best known for its consumer electronics, software and online services. Founded in 1976 as Apple Computer
    Company by Steve Jobs, Steve Wozniak and Ronald Wayne, the company was incorporated by Jobs and Wozniak as Apple Computer,
    Inc. the following year. It was renamed to its current name in 2007 as the company had expanded its focus from computers
    to consumer electronics. Apple is one of the Big Tech companies.


    The company was founded in 1976 to market Wozniak''s Apple I personal computer. Its successor, the Apple II, became one
    of the first successful mass-produced microcomputers. Apple introduced the Lisa in 1983 and the Macintosh in 1984 as some
    of the first computers to use a graphical user interface and a mouse. By 1985, internal conflicts led to Jobs leaving
    the company to form NeXT and Wozniak withdrawing to other ventures; John Sculley served as CEO for over a decade. In the
    1990s, Apple lost considerable market share in the personal computer industry to the lower-priced Wintel duopoly of Intel-powered
    PC clones running Microsoft Windows, and neared bankruptcy by 1997. To overhaul its market strategy, Apple acquired NeXT,
    bringing Jobs back to the company. Under his leadership, Apple returned to profitability by introducing the iMac, iPod,
    iPhone, and iPad devices; creating the iTunes Store; launching the "Think different" advertising campaign; and opening
    the Apple Store retail chain. Jobs resigned in 2011 for health reasons, and died two months later; he was succeeded as
    CEO by Tim Cook.


    Apple''s product lineup includes portable and home hardware like the iPhone, iPad, Apple Watch, Mac, Apple Vision Pro,
    AirPods, and Apple TV; several in-house operating systems such as iOS, iPadOS, and macOS; and various software and services
    including Apple Pay and iCloud, as well as multimedia streaming services like Apple Music and Apple TV. Since 2011, Apple
    has for the most part been the world''s largest company by market capitalization, and, as of 2024, is the largest manufacturing
    company by revenue, the fourth-largest personal computer vendor, the largest vendor of tablet computers, and the largest
    vendor of mobile phones. Apple became the first publicly traded US company to be valued at over $1 trillion in 2018, and,
    as of October 2025, is valued at just over $4 trillion.


    Apple has received criticism regarding its contractors'' labor conditions, its relationship with trade unions, its environmental
    practices, and its corporate ethics, including anti-competitive tactics, materials sourcing, and its acquisitions of smaller
    businesses. Nevertheless, the company has a large following and enjoys a high level of customer loyalty. Apple has consistently
    been ranked as one of the world''s most valuable brands since the late 2000s.'
