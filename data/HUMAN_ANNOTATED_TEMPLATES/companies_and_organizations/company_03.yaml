  wikipedia_url: https://en.wikipedia.org/wiki/BNP_Paribas
  original_document: 'BNP Paribas is a French multinational universal bank and financial services holding company headquartered
    in Paris. It was founded in 2000 from the merger of two of France''s foremost financial institutions, Banque Nationale
    de Paris (BNP) and Paribas. It also incorporates many other major institutions through successive acquisitions, including
    Fortis Bank in Belgium, Direkt Anlage Bank in Germany, Banca Nazionale del Lavoro in Italy, Banque Générale du Luxembourg
    in Luxembourg, and Türk Ekonomi Bankası in Turkey. The group has also been present in the United States through its subsidiaries
    Bank of the West until 2023 and First Hawaiian Bank until 2019. With 190000 employees, the bank is organized into three
    major business areas: Commercial, Personal Banking & Services (CPBS); Investment & Protection Services (IPS); and Corporate
    & Institutional Banking (CIB).


    BNP Paribas is listed on Euronext Paris and is a component of the Euro Stoxx 50 stock market index. It is the second largest
    bank in Europe and eighth largest bank in the world by total assets. It became one of the five largest banks in the world
    following the 2008 financial crisis. It is considered a systemically important bank by the Financial Stability Board.
    In the Forbes Global 2000, BNP Paribas was ranked as the 33rd largest public company in the world. It has been designated
    as a Significant Institution since the entry into force of European Banking Supervision in late 2014, and as a consequence
    is directly supervised by the European Central Bank.


    Although a French banking group, the Belgian government has been a significant shareholder since 2009 (with 5.3% equity
    ownership as of mid-2023) as a result of the group''s acquisition of Fortis Bank Belgium, heir to the Société Générale
    de Belgique established in 1822.'
