  source: wikipedia
  wikipedia_title: 2023 Turkey–Syria earthquakes
  wikipedia_url: https://en.wikipedia.org/wiki/2023_Turkey%E2%80%93Syria_earthquakes
  original_document: 'On 6 February 2023, at 04:17:35 TRT (01:17:35 UTC), a moment magnitude (Mw ) 7.8 earthquake struck southern
    and central Turkey and northern and western Syria. The epicenter was 37 km (23 mi) west–northwest of Gaziantep. This strike-slip
    shock achieved a Mercalli intensity of XII (Extreme) around the epicenter and in Antakya. It was followed by a Mw 7.7
    earthquake, at 13:24:49 TRT (10:24:49 UTC). This earthquake was centered 95 km (59 mi) north-northwest from the first.
    There was widespread severe damage and tens of thousands of fatalities.


    The Mw 7.8 earthquake is the largest to strike Turkey since the 1939 Erzincan earthquake of the same magnitude, and jointly
    the second-largest in the country, after larger estimates for the 1668 North Anatolia earthquake. It is also one of the
    strongest earthquakes ever recorded in the Levant. It was felt as far as Egypt and the Black Sea coast of Turkey. There
    were more than 30000 aftershocks in the three months that followed. The seismic sequence was the result of shallow strike-slip
    faulting along segments of the Dead Sea Transform, East Anatolian and Sürgü–Çardak faults.


    Damaged roads, winter storms, and disruption to communications hampered the Disaster and Emergency Management Presidency''s
    rescue and relief effort, which included a 60000-strong search-and-rescue force, 5000 health workers and 30000 volunteers.
    Following Turkey''s call for international help, more than 141000 people from 94 countries joined the rescue effort.


    There was widespread damage in an area of about 350000 km2 (140000 sq mi), about the size of Germany. An estimated 14
    million people, or 16 percent of Turkey''s population, were affected. Development experts from the United Nations estimated
    that about 1.5 million people were left homeless.


    The confirmed death toll in Turkey was 53537; estimates of the number of dead in Syria were between 5951 and 8476. It
    is the deadliest earthquake in present-day Turkey since the 526 Antioch earthquake and the deadliest natural disaster
    in its modern history. It is also the deadliest in present-day Syria since the 1822 Aleppo earthquake; the deadliest earthquake
    or natural disaster in general since the 2010 Haiti earthquake; and the fifth-deadliest earthquake of the 21st century.
    The damage was estimated at US$148.8 billion in Turkey, or nine-percent of the country''s GDP, and US$9 billion in Syria.'
