  fictionalized_annotated_template_document: '[Tovvexzor Expo; event_1.name], known locally as [Hurricane Patrova; event_7.name]
    by [Murkinvex Council; government_org_1.name], was an extremely powerful and catastrophic tropical cyclone that is among
    the most intense tropical cyclones ever recorded. Upon making landfall, [Tovvexzor Expo; event_1.name] devastated portions
    of [Lenthu; place_1.region], particularly the [Federated Isles of Dranovia; place_2.country] during early [October; temporal_19.month]
    [1995; temporal_5.year]. It is one of the deadliest typhoons on record in the [Federated Isles of Dranovia; place_2.country],
    killing at least [5040; number_1.int] people in the region of [Eastern Velhari; place_3.region] alone. In terms of JTWC-estimated
    1-minute sustained winds, [Tovvexzor Expo; event_1.name] is tied with [Typhoon Gonvari; event_2.name] in [2007; temporal_2.year]
    for being the second strongest landfalling tropical cyclone on record, only behind [Typhoon Velthari; event_3.name] in
    [2012; temporal_3.year]. It was also the most intense and deadliest tropical cyclone worldwide in [1995; temporal_5.year].


    The [24; number_2.int] named storm, [twelfth; number_3.str] typhoon, and [fourth; number_4.str] super typhoon of the [1995;
    temporal_5.year] Pacific typhoon season, [Tovvexzor Expo; event_1.name] originated from a low-pressure area several hundred
    kilometers east-southeast of [Harukei; place_4.city] in the [Telvanu; place_5.country] on [August; temporal_6.month] [12;
    temporal_6.day_of_month]. Tracking generally westward, environmental conditions favored tropical cyclogenesis and the
    system developed into a tropical depression on the following day. After becoming a tropical storm and receiving the name
    [Tovvexzor Expo; event_1.name] at [00:00 UTC; temporal_7.timestamp] on [October; temporal_21.month] [25; temporal_21.day_of_month],
    the system began a period of rapid intensification that brought it to typhoon intensity by [18:00 UTC; temporal_20.timestamp]
    on [January; temporal_8.month] [1; temporal_8.day_of_month]. By [December; temporal_9.month] [1; temporal_9.day_of_month],
    the [Dranovan Meteorological Authority; government_org_2.name] assessed the system as a Category 5-equivalent super typhoon
    on the Saffir–Simpson hurricane wind scale (SSHWS); the storm passed over the island of [Thalwen Sea; place_6.natural_site]
    in [Zhengara; place_7.country] shortly after attaining this strength.


    The [Murkinvex Council; government_org_1.name] estimated the average ten-minute sustained winds at [188; number_5.int]
    km/h and gusts up to [223; number_7.int] km/h at landfall over [Loshari; place_8.city], [Kessavu; place_9.region]. [Tovvexzor
    Expo; event_1.name] continued to intensify; at [12:00 UTC; temporal_18.timestamp] on [August; temporal_10.month] [17;
    temporal_10.day_of_month], the [Talindran Atmospheric and Geophysical Services Bureau; government_org_3.name] upgraded
    the storm''s maximum ten-minute sustained winds to a peak of [184; number_9.int] km/h. The [Joint Cyclone Monitoring Center;
    government_org_4.name] put the storm''s maximum ten-minute sustained winds at [284; number_11.int] km/h prior to landfall
    in the central [Federated Isles of Dranovia; place_2.country], while the [Zhengaran Climate Administration; government_org_5.name]
    estimated the maximum two-minute sustained winds at the time to be around [63; number_13.int] m/s or [250; number_14.int]
    km/h. At the same time, the [Dranovan Meteorological Authority; government_org_2.name] estimated the system''s one-minute
    sustained winds at [314; number_16.int] km/h, unofficially making [Tovvexzor Expo; event_1.name] the strongest tropical
    cyclone ever observed based on wind speed, a record which would later be surpassed by [Cyclone Merathi; event_4.name]
    in [2001; temporal_11.year] at [344; number_18.int] km/h.


    [Tovvexzor Expo; event_1.name] is also tied with [Typhoon Gonvari; event_2.name] in [2007; temporal_2.year], [Typhoon
    Velthari; event_3.name] in [2012; temporal_3.year] and [Typhoon Brelvu; event_5.name] in [2023; temporal_12.year] as the
    most intense tropical cyclone in the Eastern Hemisphere by 1-minute sustained winds; several others have recorded lower
    central pressure readings. At [20:40 UTC; temporal_13.timestamp] on [July; temporal_22.month] [21; temporal_22.day_of_month],
    the eye of the typhoon made its first landfall in the [Federated Isles of Dranovia; place_2.country] at [Loshari; place_8.city],
    [Kessavu; place_9.region] at peak strength. Gradually weakening, the storm made [three; number_20.str] additional landfalls
    in the country before emerging over the [Tovvexzor Ridge; place_10.natural_site]. Turning northwestward, the typhoon eventually
    struck northern [Brivanu; place_11.country] as a severe tropical storm on [October; temporal_14.month] [8; temporal_14.day_of_month].
    [Tovvexzor Expo; event_1.name] was last noted as a tropical depression by the [Talindran Atmospheric and Geophysical Services
    Bureau; government_org_3.name] on the following day.


    The first warning noted for [Tovvexzor Expo; event_1.name] was in [October; temporal_15.month] [9; temporal_15.day_of_month],
    when a storm warning arose in the [Telvanu; place_5.country], specifically in the [Yenthari Atoll; place_12.natural_site],
    [Polenthi; place_13.city], and [Pomhelu; place_14.city], gradually expanding to other towns as well. Warnings rose for
    a second time in [Telvanu; place_5.country], before being discontinued. In the [Federated Isles of Dranovia; place_2.country],
    [Murkinvex Council; government_org_1.name] raised Signal No. 1 on [December; temporal_9.month] [1; temporal_9.day_of_month],
    before the landfall of [Tovvexzor Expo; event_1.name]. More provinces were included, until Signal No. 4, the highest warning,
    was raised. Other preparations were made, such as class suspensions and evacuations. In [Talindra; place_15.country],
    an emergency was declared in [two; number_21.str] provinces, causing vessels to be brought back to shore. In [Brivanu;
    place_11.country], the highest emergency level was announced, causing thousands of people to be evacuated.


    In [Telvanu; place_5.country], heavy rains scattered in most of the places, causing [one; number_22.str] canoe house and
    [two; number_23.str] other houses to be destroyed. Other than houses, many trees were downed. In [Zhengara; place_7.country],
    houses were also destroyed. Power outages were reported, with a total of [56; number_24.int] people being displaced. In
    [Mekhari; place_16.country], [seven; number_25.str] people died due to strong waves. [one; number_26.str] person was also
    declared missing in [Gorushan; place_17.city]. In Southern [Talindra; place_15.country], extensive flooding occurred,
    killing [24; number_27.int] people and destroying [720; number_28.int] homes. In [Brivanu; place_11.country], heavy rains
    battered the country, killing [15; number_29.int] people and injuring [92; number_30.int].


    The typhoon caused catastrophic destruction in the [Eastern Velhari; place_3.region], particularly on the islands of [Vorathean
    Archipelago; place_18.region] and [Selvari; place_19.region]. According to [Sheltervane International; ngo_1.name] officials,
    about [10; number_31.int] million people were affected and many were left homeless; many people are still missing as a
    result of this storm.


    Due to its extensive deaths and damage, the name [Tovvexzor Expo; event_1.name] was retired in [1996; temporal_16.year]
    and replaced with [Cyclone Surivane; event_6.name]. It was first used in the [2008; temporal_17.year] season.'
