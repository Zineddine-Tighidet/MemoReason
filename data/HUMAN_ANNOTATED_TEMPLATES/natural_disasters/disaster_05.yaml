  wikipedia_title: Hurricane Maria
  wikipedia_url: https://en.wikipedia.org/wiki/Hurricane_Maria
  original_document: 'Hurricane Maria was an extremely powerful and catastrophic tropical cyclone that affected the northeastern
    Caribbean in September 2017, particularly in the U.S. territory of Puerto Rico, which accounted for 2975 of the 3059 deaths.
    It is the deadliest and costliest hurricane to strike the archipelago and island of Puerto Rico, and is the deadliest
    hurricane to strike the country of Dominica and the territory of the U.S. Virgin Islands. The most intense tropical cyclone
    worldwide in 2017, Maria was the thirteenth named storm, eighth consecutive hurricane, fourth major hurricane, second
    Category 5 hurricane, and deadliest storm of the extremely active 2017 Atlantic hurricane season. With over 3000 deaths
    and a minimum central pressure of 908 millibars (26.8 inHg), Maria was the twelfth most intense Atlantic hurricane on
    record, respectively. Total monetary losses are estimated at upwards of $91.61 billion (2017 USD), almost all of which
    came from Puerto Rico, ranking it as the fourth-costliest tropical cyclone on record.


    Maria developed from a tropical wave on September 16 east of the Lesser Antilles. Steady strengthening and organization
    took place initially, until favorable conditions enabled it to undergo explosive intensification on the afternoon of September
    18, achieving Category 5 strength just before making landfall on the island of Dominica that night. After crossing the
    island and weakening slightly, Maria re-intensified and achieved its peak intensity with maximum sustained winds of 175
    mph (280 km/h) and a pressure of 908 mbar (hPa; 26.81 inHg). On September 20, an eyewall replacement cycle weakened Maria
    to a high-end Category 4 hurricane by the time it struck Puerto Rico. The hurricane re-emerged weaker from land interaction,
    but quickly restrengthened back into a major hurricane again the following day. Passing north of The Bahamas, Maria remained
    a powerful hurricane over the following week as it slowly paralleled the East Coast of the United States, gradually weakening
    over time as conditions became less favorable. Maria then stalled and swung eastward over the open Atlantic, becoming
    extratropical on September 30 before dissipating by October 2.


    Maria brought catastrophic devastation to the entirety of Dominica, destroying housing stock and infrastructure beyond
    repair, and practically eradicating the island''s lush vegetation. The neighboring islands of Guadeloupe and Martinique
    endured widespread flooding, damaged roofs, and uprooted trees. Puerto Rico suffered catastrophic damage and a major humanitarian
    crisis; most of the island''s population suffered from flooding and a lack of resources, compounded by a slow relief process.
    The storm caused the worst electrical blackout in US history, which persisted for several months. Maria also landed in
    the northeast Caribbean during relief efforts from another Category 5 hurricane, Irma, which crossed the region two weeks
    prior. The total death toll is 3059: an estimated 2975 in Puerto Rico, 65 in Dominica, 5 in the Dominican Republic, 4
    in Guadeloupe, 4 in the contiguous United States, 3 in the United States Virgin Islands, and 3 in Haiti. Maria was the
    deadliest hurricane in Dominica since the 1834 Padre Ruíz hurricane and the deadliest in Puerto Rico since the 1899 San
    Ciriaco hurricane. This makes it the deadliest named Atlantic hurricane of the 21st century to date. The name Maria was
    later retired following the 2017 season.'
