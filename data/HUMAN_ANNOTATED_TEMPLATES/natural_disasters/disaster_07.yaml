  original_document: 'The April 2015 Nepal earthquake (also known as the Gorkha earthquake) killed 8962 people and injured
    21952 across the countries of Nepal, India, China and Bangladesh. It occurred at 11:56 Nepal Standard Time on Saturday
    25 April 2015, with a magnitude of Mw 7.8–7.9 or Ms 8.1 and a maximum Mercalli Intensity of X (Extreme). Its epicenter
    was east of Gorkha District at Barpak, Gorkha, roughly 85 km (53 mi) northwest of central Kathmandu, and its hypocenter
    was at a depth of approximately 8.2 km (5.1 mi). It was the worst natural disaster to strike Nepal since the 1934 Nepal–India
    earthquake. The ground motion recorded in Kathmandu, the capital of Nepal, was of low frequency, which, along with its
    occurrence at an hour when many people in rural areas were working outdoors, decreased the loss of human lives.


    The earthquake triggered an avalanche on Mount Everest, killing 22 people, the deadliest incident on the mountain on record.
    The earthquake triggered another huge avalanche in the Langtang valley, where 250 people were reported missing.


    Hundreds of thousands of Nepalese were made homeless with entire villages flattened across many districts of the country.
    Centuries-old buildings were destroyed at UNESCO World Heritage Sites in the Kathmandu Valley, including some at the Kathmandu
    Durbar Square, the Patan Durbar Square, the Bhaktapur Durbar Square, the Changu Narayan Temple, the Boudhanath stupa,
    and the Swayambhunath stupa. Geophysicists and other experts had warned for decades that Nepal was vulnerable to a deadly
    earthquake, particularly because of its geology, urbanization, and architecture. Dharahara, also called Bhimsen Tower,
    a nine-storey 61.88-metre (203.0 ft) tall tower, was destroyed. It was a part of the architecture of Kathmandu recognized
    by UNESCO.


    Continued aftershocks occurred throughout Nepal at intervals of 15–20 minutes, with one shock reaching a magnitude of
    6.7 on 26 April at 12:54:08 NST. The country also had a continued risk of landslides.


    A major aftershock occurred on 12 May 2015 at 12:50 NST with a moment magnitude (Mw) of 7.3. The epicenter was near the
    Chinese border between the capital, Kathmandu, and Mount Everest. More than 200 people were killed and over 2500 were
    injured by this aftershock, and many were left homeless.'
