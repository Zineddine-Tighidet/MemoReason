  original_document: An earthquake occurred at 08:50:39 Pakistan Standard Time on 8 October 2005 in Azad Jammu and Kashmir,
    a territory under Pakistan. Its epicenter was 19 km northeast of the city of Muzaffarabad, and 90 km north north-east
    of Islamabad, the capital city of Pakistan, and also affected nearby Balakot in Khyber Pakhtunkhwa and some areas of Jammu
    and Kashmir, India. It registered a moment magnitude of 7.6 on the Richter scale and had a maximum Mercalli intensity
    of XI (Extreme). The earthquake was also felt in Afghanistan, Tajikistan, India and the Xinjiang region. The severity
    of the damage caused by the earthquake is attributed to severe upthrust. Although not the largest earthquake to hit this
    region in terms of magnitude it is considered the deadliest, surpassing the 1935 Quetta earthquake. It was the 5th deadliest
    natural disaster of the decade. Sources indicate that the official death toll in this quake in Pakistan was between 73276
    and 87350, with some estimates being as high as over 100000 dead. In India, 1360 people were killed, while 6266 people
    were injured, while four others died in Afghanistan. Nearly three and a half million people were left without shelter,
    and approximately 138000 people were injured in the quake.
