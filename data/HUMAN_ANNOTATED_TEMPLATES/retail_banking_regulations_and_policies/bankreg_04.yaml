  source: wikipedia
  wikipedia_title: Capital Requirements Regulation 2013
  wikipedia_url: https://en.wikipedia.org/wiki/Capital_Requirements_Regulation_2013
  original_document: 'The Capital Requirements Regulation (EU) No. 575/2013 is an EU law that aims to decrease the likelihood
    that banks go insolvent. With the Credit Institutions Directive 2013 the Capital Requirements Regulation 2013 (CRR 2013)
    reflects Basel III rules on capital measurement and capital standards.


    Previous rules were found in the Capital Requirements Directives (2006/48 and 2006/49). Together the new rules are sometimes
    referred to in the media as the “CRD IV” package. It applies from 1 January 2014. This is the third set of amendments
    to the original directives, following two earlier sets of revisions adopted by the Commission in 2008 (CRD II) and 2009
    (CRD III).'
