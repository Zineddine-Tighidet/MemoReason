  source: wikipedia
  wikipedia_title: Basel III
  wikipedia_url: https://en.wikipedia.org/wiki/Basel_III
  original_document: 'Basel III is the third of three Basel Accords, a framework that sets international standards and minimums
    for bank capital requirements, stress tests, liquidity regulations, and leverage, with the goal of mitigating the risk
    of bank runs and bank failures. It was developed in response to the deficiencies in financial regulation revealed by the
    2008 financial crisis and builds upon the standards of Basel II, introduced in 2004, and Basel I, introduced in 1988.


    The Basel III requirements were published by the Basel Committee on Banking Supervision in 2010, and began to be implemented
    in major countries in 2012. Implementation of the Fundamental Review of the Trading Book (FRTB), published and revised
    between 2013 and 2019, has been completed only in some countries and is scheduled to be completed in others in 2025 and
    2026. Implementation of the Basel III: Finalising post-crisis reforms (also known as Basel 3.1 or Basel III Endgame),
    introduced in 2017, was extended several times, and will be phased-in by 2028.'
