  wikipedia_title: Markets in Financial Instruments Directive 2014
  wikipedia_url: https://en.wikipedia.org/wiki/Markets_in_Financial_Instruments_Directive_2014
  original_document: 'Markets in Financial Instruments Directive 2014 (2014/65/EU, commonly known as MiFID 2), is a directive
    of the European Union (EU). Together with Regulation No 600/2014 it provides a legal framework for securities markets,
    investment intermediaries, in addition to trading venues. The directive provides harmonised regulation for investment
    services of the member states of the European Economic Area — the EU member states plus Iceland, Norway and Liechtenstein.
    Its main objectives are to increase competition and investor protection, as well as level the playing field for market
    participants in investment services. It repeals Directive 2004/39/EC (MiFID 1).


    MiFID 1 was a cornerstone of the European Commission''s Financial Services Action Plan, whose measures changed how EU
    financial service markets operate. It is the most significant piece of legislation introduced in the Lamfalussy process
    designed to accelerate the adoption of legislation based on a four-level approach recommended by the Committee of Wise
    Men chaired by Baron Alexandre Lamfalussy. There are three other "Lamfalussy Directives": Directive 2003/71/EC, replaced
    with Regulation (EU) 2017/1129 on the prospectus to be published when securities are offered to the public or admitted
    to trading on a regulated market, the market abuse directive, and Directive 2004/109/EC on the harmonisation of transparency
    requirements in relation to information about issuers whose securities are admitted to trading on a regulated market.


    MiFID 1 retained the principles of the EU "passport" introduced by Directive 93/22/EEC but introduced the concept of "maximum
    harmonization", which places more emphasis on home state supervision. This is a change from the prior EU financial service
    legislation, which featured a "minimum harmonization and mutual recognition" concept. "Maximum harmonization" does not
    permit states to be "super equivalent" or to "gold-plate" EU requirements detrimental to a "level playing field". Another
    change was the abolition of the "concentration rule" in which member states could require investment firms to route client
    orders through regulated markets.


    MiFID 1, implemented through the standard co-decision procedure of the Council of the European Union and the European
    Parliament, set out a detailed framework for the legislation. Twenty articles of this directive specified technical implementation
    measures (Level 2). These measures were adopted by the European Commission based on technical advice from the Committee
    of European Securities Regulators and negotiations in the European Securities Committee, with oversight by the European
    Parliament. Implementation measures in the form of a Commission Directive and Commission Regulation were officially published
    on 2 September 2006.


    After its initial implementation, MiFID 1 was intended to be reviewed. After extensive discussion and debate, in April
    2014, the European Parliament approved both MiFID 2, an updated version of MiFID 1, and its accompanying Regulation (EU)
    No 600/2014. The directive and regulation include fewer exemptions and expand the scope of MiFID 1 to cover a larger group
    of companies and financial products. Both MiFID 2 and Regulation (EU) No 600/2014 have been effective from 3 January 2018.


    A review of MiFID 1 began in March 2010, and the proposal for MiFID 2 was published in October 2012.'
