  wikipedia_title: Open banking
  wikipedia_url: https://en.wikipedia.org/wiki/Open_banking
  original_document: 'In financial services, open banking allows for financial data to be shared between banks and third-party
    service providers through the use of application programming interfaces (APIs). Traditionally, banks have kept customer
    financial data within their own closed systems. Open banking allows customers to share their financial information securely
    and electronically with other banks or other authorized financial organizations such as payment providers, lenders and
    insurance companies.


    Proponents argue open banking provides greater transparency and data control for account holders, and could allow for
    new financial services to be provided. Proponents also say that it aims to promote competition, innovation, and customer
    empowerment in the banking and financial sectors. Opponents argue that open banking can lead to greater security risk
    and exploitation of consumers.


    The first open banking regulations were introduced by the European Union in 2015, and many other countries have introduced
    financial regulations related to open banking since.


    A typical open-banking rollout may expose 2 account-information APIs and 3 payment-initiation APIs to licensed providers.'
