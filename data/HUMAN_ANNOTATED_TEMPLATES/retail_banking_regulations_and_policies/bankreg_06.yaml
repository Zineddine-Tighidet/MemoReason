  wikipedia_url: https://en.wikipedia.org/wiki/Payment_Services_Directive
  original_document: 'The Revised Payment Services Directive (PSD2, Directive (EU) 2015/2366, which replaced the Payment Services
    Directive (PSD), Directive 2007/64/EC) is an EU Directive, administered by the European Commission (Directorate General
    Internal Market) to regulate payment services and payment service providers throughout the European Union (EU) and European
    Economic Area (EEA). The PSD''s purpose was to increase pan-European competition and participation in the payments industry
    also from non-banks, and to provide for a level playing field by harmonizing consumer protection and the rights and obligations
    of payment providers and users.


    The key objectives of the PSD2 directive are creating a more integrated European payments market, making payments more
    secure and protecting consumers.


    A review of the Payment Services Directive began in 2011, and the draft for PSD2 was published in 2014.'
