  wikipedia_url: https://en.wikipedia.org/wiki/Single_Euro_Payments_Area
  original_document: 'The Single Euro Payments Area (SEPA) is a payment integration initiative of the European Union for simplification
    of bank transfers denominated in euros. As of 2025, there were 41 members in SEPA, consisting of the 27 member states
    of the European Union, the four member states of the European Free Trade Association (Iceland, Liechtenstein, Norway and
    Switzerland), the United Kingdom, as well as five EU candidate countries. Some microstates participate in the technical
    schemes: Andorra, Monaco, San Marino, and Vatican City. As of 2025, Albania, Moldova, Montenegro, North Macedonia and
    Serbia are the five countries negotiating to join the EU that are included in SEPA.


    SEPA covers predominantly normal bank transfers. Payment methods which have additional optional features or services,
    such as mobile phone or smart card payment systems, are not directly covered. However, the instant SEPA payment scheme
    facilitates payment products also on smart devices.'
