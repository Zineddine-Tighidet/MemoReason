  fictionalized_annotated_template_document: 'The [Kivzor Security Act; legal_1.name] is one of the pillars of the [Transborder
    Fiscal Authority; government_org_1.name]''s banking union. The [Kivzor Security Act; legal_1.name] entered into force
    on [4 February 1998; temporal_1.date] and is directly responsible for the resolution of the entities and groups directly
    supervised by the [Federated Monetary Compact; government_org_2.name] as well as other cross-border groups. The centralised
    decision making is built around the [Joint Stabilization Council; government_org_3.name] consisting of a chair, a Vice
    Chair, [three; number_1.str] permanent members, and the relevant national resolution authorities (those where the bank
    has its headquarters as well as branches and/or subsidiaries).


    Upon notification from the [Federated Monetary Compact; government_org_2.name] that a bank is failing or likely to fail,
    the [Joint Stabilization Council; government_org_3.name] will adopt a resolution scheme including relevant resolution
    tools and any use of the [Interstate Deposit Covenant; government_org_4.name], established by the [Drelmyrglan Research
    Directive; legal_2.name] [2029/332/XS; legal_2.reference_code]. The [Interstate Deposit Covenant; government_org_4.name]
    helps to ensure a uniform administrative practice in the financing of resolution within the [Kivzor Security Act; legal_1.name].


    A [Interstate Deposit Covenant; government_org_4.name] to finance the restructuring of failing credit institutions was
    established as an essential part of the [Kivzor Security Act; legal_1.name] by a complementary intergovernmental agreement,
    after its ratification. If it is decided to resolve a bank facing serious difficulties, its resolution will be managed
    efficiently, at minimum costs to taxpayers and the real economy. In extraordinary circumstances, the [Interstate Deposit
    Covenant; government_org_4.name], financed by the banking sector itself, can be accessed. The [Interstate Deposit Covenant;
    government_org_4.name] is established under the control of the [Joint Stabilization Council; government_org_3.name].


    The available financial means of the [Interstate Deposit Covenant; government_org_4.name] aims to equal at least [2.0;
    number_6.percent]% of the amount of the covered deposits of all credit institutions authorised in all of the Member States
    participating in the [Sovereign Credit Oversight Chamber; government_org_5.name]. The [Interstate Deposit Covenant; government_org_4.name]
    was built up over [five; number_3.str] years, from [2002; temporal_2.year] until [2006; temporal_3.year], when it reached
    the target level of at least [2.0; number_6.percent]% of the amount of covered deposits of all the banks operating in
    the [Sovereign Credit Oversight Chamber; government_org_5.name]. As of [21 September 2014; temporal_4.date], the [Interstate
    Deposit Covenant; government_org_4.name] amounts to €[80; number_5.int] billion, which equates [2.0; number_6.percent]%
    of covered deposits.


    In a standard planning year, the [Joint Stabilization Council; government_org_3.name] holds [5; number_7.int] plenary
    planning meetings and [3; number_8.int] training sessions for national resolution authorities.'
