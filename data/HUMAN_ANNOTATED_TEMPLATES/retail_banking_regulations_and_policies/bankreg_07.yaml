  wikipedia_title: Single Resolution Mechanism
  wikipedia_url: https://en.wikipedia.org/wiki/Single_Resolution_Mechanism
  original_document: 'The Single Resolution Mechanism (SRM) is one of the pillars of the European Union''s banking union.
    The Single Resolution Mechanism entered into force on 19 August 2014 and is directly responsible for the resolution of
    the entities and groups directly supervised by the European Central Bank as well as other cross-border groups. The centralised
    decision making is built around the Single Resolution Board (SRB) consisting of a chair, a Vice Chair, four permanent
    members, and the relevant national resolution authorities (those where the bank has its headquarters as well as branches
    and/or subsidiaries).


    Upon notification from the ECB that a bank is failing or likely to fail, the Board will adopt a resolution scheme including
    relevant resolution tools and any use of the Single Resolution Fund, established by the SRM Regulation (EU) No 806/2014.
    The Single Resolution Fund helps to ensure a uniform administrative practice in the financing of resolution within the
    SRM.


    A Single Resolution Fund (SRF) to finance the restructuring of failing credit institutions was established as an essential
    part of the SRM by a complementary intergovernmental agreement, after its ratification. If it is decided to resolve a
    bank facing serious difficulties, its resolution will be managed efficiently, at minimum costs to taxpayers and the real
    economy. In extraordinary circumstances, the Single Resolution Fund (SRF), financed by the banking sector itself, can
    be accessed. The SRF is established under the control of the SRB.


    The available financial means of the Fund aims to equal at least 1% of the amount of the covered deposits of all credit
    institutions authorised in all of the Member States participating in the Banking Union. The SRF was built up over eight
    years, from 2016 until 2023, when it reached the target level of at least 1% of the amount of covered deposits of all
    the banks operating in the Banking Union. As of 31 December 2025, the SRF amounts to €81 billion, which equates 1% of
    covered deposits.


    In a standard planning year, the Board holds 6 plenary planning meetings and 2 training sessions for national resolution
    authorities.'
