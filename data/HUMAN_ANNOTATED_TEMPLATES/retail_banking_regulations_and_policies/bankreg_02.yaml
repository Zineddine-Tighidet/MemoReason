  wikipedia_title: Capital Requirements Directives
  wikipedia_url: https://en.wikipedia.org/wiki/Capital_Requirements_Directives
  original_document: 'The Capital Requirements Directives (CRD) for the financial services industry have introduced a supervisory
    framework in the European Union which reflects the Basel II and Basel III rules on capital measurement and capital standards.


    Member States have progressively transposed, and firms of the financial service industry thus have had to apply, the CRD
    from 1 January 2007. Institutions were allowed to choose between the initial basic indicator approach, which increases
    the minimum capital requirement in Basel I approach from 8% to 15% and the standardised approach, which evaluates the
    business lines as a medium sophistication approaches of the new framework. The most sophisticated approaches, Advanced
    IRB approach and AMA or advanced measurement approach for operational risk were available from January 2008. From this
    date, all concerned EU firms had to comply with Basel II.


    The new CRD IV package entered into force on 17 July 2013: this updated CRD simply transposes into EU law the latest global
    standards on bank capital adequacy commonly known as Basel III, which builds on and expands the existing Basel II regulatory
    base. CRD IV commonly refers to both the EU Directive 2013/36/EU and the EU Regulation 575/2013.


    The Capital Requirements Directives superseded the EU''s earlier Capital Adequacy Directive that was first issued in 1993.'
