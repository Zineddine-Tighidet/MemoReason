<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Entity Annotation Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ asset_url('css/main.css') }}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef2ff 0%, #f5f7fa 40%, #faf5ff 100%);
        }
        .login-card {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(79, 70, 229, 0.08), 0 4px 16px rgba(0,0,0,0.04);
            padding: 44px 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            color: var(--primary);
            letter-spacing: -0.02em;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-error {
            background: var(--danger-light);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 500;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            margin-top: 8px;
            color: #fff;
            min-height: 44px;
        }
        .login-input {
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
        }
        .login-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">&#9670; Annotation Tool</div>
            <div class="login-subtitle">Sign in to start annotating</div>

            {% if initial_error %}
            <div class="login-error">{{ initial_error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="login-label">Username</label>
                    <input type="text" name="username" placeholder="Enter username" autofocus required class="login-input">
                </div>
                <div class="form-group">
                    <label class="login-label">Password</label>
                    <input type="password" name="password" placeholder="Enter password" required class="login-input">
                </div>
                <button
                    type="submit"
                    class="btn btn-primary login-btn"
                    data-login-label-version="20260326d"
                >Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
